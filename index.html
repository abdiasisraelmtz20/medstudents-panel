/* ---- Diagnóstico de clave ---- */
async function sbDiag(){
  const c=sbCfg();
  if(!c){toast('Configure primero URL y llaves.','err');return;}
  openModal('🩺 Diagnóstico de conexión','<div class="fld full" id="msDiagBox">Probando…</div>',null);
  const out=[];
  const linea=(t,ok,d)=>out.push('<div style="margin-bottom:12px"><b style="color:'+(ok?'var(--ok)':'var(--red)')+'">'+(ok?'✔':'✘')+' '+t+'</b><div class="tsub" style="white-space:normal;margin-top:3px;word-break:break-all">'+esc(d||'')+'</div></div>');
  linea('URL configurada',/^https:\/\/[a-z0-9]+\.supabase\.co\/?$/.test(c.url.trim()),c.url+(/supabase\.co/.test(c.url)?'':' ← ¡Debe terminar en .supabase.co, sin /dashboard/!'));
  linea('Clave de equipo escrita',!!c.clave,c.clave?('Longitud: '+c.clave.length+' caracteres'):'VACÍA — escríbala en el campo de arriba');
  try{
    const{createClient}=window.supabase;
    const t=createClient(c.url,c.key,{global:{headers:{'x-ms-clave':c.clave||''}}});
    const{data,error}=await t.rpc('ms_debug_header');
    if(error){
      linea('Función de diagnóstico en Supabase',false,'No existe. Corra el archivo diagnostico.sql en el SQL Editor. Error: '+error.message);
    }else if(data&&data.length){
      const rec=data[0].clave_recibida, ok=data[0].coincide===true;
      linea('¿Llega la clave a Supabase?',rec!=='(NO LLEGA NADA)','Supabase recibió: "'+rec+'"');
      linea('¿La clave coincide con la del SQL?',ok,ok?'Correcta ✓':'NO coincide. La del panel es distinta a la que puso en blindaje_rls.sql. Deben ser idénticas.');
    }

   ====================================================================== */

/* ---- Normalizar referencia para comparar (quita espacios, guiones, ceros a la izquierda) ---- */
function normRef(s){
  return String(s||'').toLowerCase().replace(/[\s\-\/#.]/g,'').replace(/^0+/,'').trim();
}
/* ---- Buscar pagos que coincidan con una referencia/monto/fecha dados ---- */
function detectarDuplicado({ref,monto,fecha,excluirPagoId,excluirRepId}){
  const nRef=normRef(ref);
  const m=Math.round(+monto||0);
  const hits=[];
  /* 1) Contra pagos ya registrados en el panel */
  db.pagos.forEach(p=>{
    if(p.anulado)return;
    if(excluirPagoId&&p.id===excluirPagoId)return;
    const pRef=normRef(p.ref);
    let score=0, motivos=[];
    if(nRef&&pRef&&nRef===pRef){score+=3;motivos.push('misma referencia');}
    if(m>0&&Math.round(+p.monto||0)===m){score+=1;motivos.push('mismo monto');}
    if(fecha&&p.fecha&&fecha===p.fecha){score+=1;motivos.push('misma fecha');}
    /* referencia idéntica = alerta fuerte; monto+fecha iguales sin ref = alerta media */
    if(score>=3||(score>=2&&nRef&&pRef&&nRef===pRef)||(!nRef&&m>0&&fecha&&score>=2)){
      const i=insc(p.inscId),a=i?alumno(i.alumnoId):null,c=i?curso(i.cursoId):null;
      hits.push({tipo:'pago',score,motivos,ref:p.ref,monto:p.monto,fecha:p.fecha,
        quien:a?nombreA(a):'(alumno)',curso:c?c.nombre:'',pagoId:p.id,recibio:p.recibio});
    }
  });
  /* 2) Contra reportes del portal aún pendientes/aprobados */
  (repPend||[]).forEach(r=>{
    if(excluirRepId&&r.id===excluirRepId)return;
    if(r.estado==='rechazado')return;
    const rRef=normRef(r.referencia);
    let score=0, motivos=[];
    if(nRef&&rRef&&nRef===rRef){score+=3;motivos.push('misma referencia');}
    if(m>0&&Math.round(+r.monto||0)===m){score+=1;motivos.push('mismo monto');}
    if(fecha&&r.fecha_pago&&fecha===r.fecha_pago){score+=1;motivos.push('misma fecha');}
    if(score>=3||(!nRef&&m>0&&fecha&&score>=2)){
      hits.push({tipo:'reporte',score,motivos,ref:r.referencia,monto:r.monto,fecha:r.fecha_pago,
        quien:r.nombre,curso:r.curso||'',estado:r.estado});
    }
  });
  return hits.sort((a,b)=>b.score-a.score);
}
/* ---- Modal de alerta de duplicado ---- */
function alertaDuplicado(hits,datos,onContinuar){
  const fuerte=hits.some(h=>h.motivos.includes('misma referencia'));
  const html=
    '<div class="fld full">'+
    '<div style="background:'+(fuerte?'#FDE7E9':'#FBF0DA')+';border:1.5px solid '+(fuerte?'#F9A0A8':'#E5D5A3')+';border-radius:12px;padding:14px;margin-bottom:14px">'+
    '<div style="font-size:15px;font-weight:800;color:'+(fuerte?'var(--red)':'#8A6D1B')+';margin-bottom:6px">'+(fuerte?'🚨 ¡ALERTA! Comprobante posiblemente duplicado':'⚠️ Posible pago repetido')+'</div>'+
    '<div class="tsub" style="white-space:normal;color:'+(fuerte?'#8A2A32':'#8A6D1B')+'">'+(fuerte
      ?'La referencia bancaria <b>'+esc(datos.ref||'(vacía)')+'</b> ya fue usada. Un alumno podría estar reportando el MISMO comprobante dos veces. Revísalo antes de continuar.'
      :'Existe otro pago con el mismo monto y fecha. Verifica que no sea el mismo comprobante contado dos veces.')+'</div></div>'+
    '<div class="tsub" style="font-weight:800;color:var(--navy);margin-bottom:8px">Coincidencias encontradas ('+hits.length+'):</div>'+
    '<div style="max-height:260px;overflow-y:auto">'+
    hits.map(h=>{
      const badge=h.motivos.includes('misma referencia')?'<span class="pill bad">MISMA REFERENCIA</span>':'<span class="pill warn">'+esc(h.motivos.join(' + '))+'</span>';
      return '<div style="border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">'+
        '<b style="color:var(--navy)">'+esc(h.quien)+'</b>'+badge+'</div>'+
        '<div class="tsub" style="margin-top:4px">'+(h.tipo==='reporte'?'📥 Reporte del portal ('+esc(h.estado||'pendiente')+')':'💰 Pago ya registrado')+
        ' · '+money(h.monto)+' · '+(h.fecha?fdate(h.fecha):'sin fecha')+' · Ref: '+esc(h.ref||'—')+(h.curso?' · '+esc(h.curso):'')+'</div></div>';
    }).join('')+
    '</div>'+
    '<div class="tsub" style="margin-top:12px;white-space:normal">Si confirmaste que <b>SÍ es un pago diferente y legítimo</b> (por ejemplo, dos abonos parciales el mismo día), puedes continuar. Si es el mismo comprobante repetido, cancela y no lo registres.</div>'+
    '</div>';
  openModal('🚨 Revisión anti-duplicado',html,fd=>{
    closeModal();
    onContinuar&&onContinuar();
  },'⚠️ Sé lo que hago, registrar de todas formas');
  /* colorear el botón de continuar en rojo */
  setTimeout(()=>{const b=$('#msadmMSave');if(b){b.style.background='linear-gradient(135deg,#D98E04,#B87503)';b.style.boxShadow='none';}},30);
}
/* ---- Verificación previa reusable: llama onOk() si está limpio, o muestra alerta ---- */
function chequearFraude(datos,onOk){
  const hits=detectarDuplicado(datos);
  if(hits.length)alertaDuplicado(hits,datos,onOk);
  else onOk();
}

/* ---- Envolver mPago: al guardar un pago nuevo, chequear duplicado ---- */
const _v5bOrigMPago=mPago;
mPago=function(inscId,pagoId){
  _v5bOrigMPago(inscId,pagoId);
  /* interceptar el submit del formulario para chequear antes de guardar */
  setTimeout(()=>{
    const form=$('#msadmMForm');
    if(!form||form.__fraudHooked)return;
    form.__fraudHooked=true;
    const origOnsubmit=onSubmit;
    if(!origOnsubmit)return;
    onSubmit=function(fd){
      const ref=fd.get('ref'), monto=+fd.get('monto')||0, fecha=fd.get('fecha');
      const hits=detectarDuplicado({ref,monto,fecha,excluirPagoId:pagoId});
      if(hits.length){
        /* guardar los datos y mostrar alerta; si el usuario confirma, ejecutar el submit original */
        alertaDuplicado(hits,{ref,monto,fecha},()=>{origOnsubmit(fd);});
      }else{
        origOnsubmit(fd);
      }
    };
  },120);
};

    if(hits.length){
      alertaDuplicado(hits,{ref:r.referencia,monto:r.monto,fecha:r.fecha_pago},()=>{_v5bOrigConfirmar(r,i,recibio);});
    }else{
      _v5bOrigConfirmar(r,i,recibio);
    }
  };
}

        }).join('')+
      '</div>';
    }).join('')+'</div>');

/* ======================================================================
   MÓDULO v9: TARIFAS Y COMBOS · retroactivo + proactivo
   ====================================================================== */
const MATS4=['ANATOMÍA','HISTOLOGÍA','EMBRIOLOGÍA','BIOQUÍMICA'];
function tarifas(){
  const t=(db.cfg&&db.cfg.tarifas)||{};
  return {
    mat:Object.assign({'ANATOMÍA':3800,'HISTOLOGÍA':3000,'EMBRIOLOGÍA':0,'BIOQUÍMICA':0},t.mat||{}),
    combos:(t.combos&&t.combos.length)?t.combos:[
      {n:'Combo Anatomía + Histología',m:['ANATOMÍA','HISTOLOGÍA'],p:6000},
      {n:'Combo Embriología + Bioquímica',m:['EMBRIOLOGÍA','BIOQUÍMICA'],p:6200}
    ]
  };
}
function tarSet(campo,valor,extra){
  db.cfg=db.cfg||{};db.cfg.tarifas=db.cfg.tarifas||{};
  const t=tarifas();
  if(campo==='mat'){t.mat[extra]=Math.max(0,+valor||0);db.cfg.tarifas.mat=t.mat;}
  if(campo==='combo'){const c=t.combos[extra];if(c)c.p=Math.max(0,+valor||0);db.cfg.tarifas.combos=t.combos;}
  if(campo==='comboMats'){const c=t.combos[extra];if(c)c.m=valor;db.cfg.tarifas.combos=t.combos;}
  save();render();toast('Tarifa actualizada ✓');
}
function tarAddCombo(){
  const t=tarifas();
  t.combos.push({n:'Nuevo combo',m:[],p:0});
  db.cfg=db.cfg||{};db.cfg.tarifas=db.cfg.tarifas||{};db.cfg.tarifas.combos=t.combos;
  save();render();
}
function tarDelCombo(ix){
  const t=tarifas();
  if(!confirm('¿Eliminar «'+(t.combos[ix]?t.combos[ix].n:'?')+'»?'))return;
  t.combos.splice(ix,1);
  db.cfg.tarifas.combos=t.combos;save();render();toast('Combo eliminado.');
}
function tarComboNom(ix,v){
  const t=tarifas();if(t.combos[ix]){t.combos[ix].n=v.trim()||'Combo';db.cfg.tarifas.combos=t.combos;save();}
}
function tarComboMat(ix,mat,check){
  const t=tarifas(),c=t.combos[ix];if(!c)return;
  c.m=c.m||[];
  if(check&&c.m.indexOf(mat)<0)c.m.push(mat);
  if(!check)c.m=c.m.filter(x=>x!==mat);
  db.cfg.tarifas.combos=t.combos;save();render();
}
/* Sincroniza el precio de lista de cada curso con su tarifa (proactivo) */
function tarSyncCursos(){
  const t=tarifas();let n=0;
  db.cursos.forEach(c=>{
    const p=t.mat[c.materia];
    if(p>0&&(+c.precio||0)!==p){c.precio=p;n++;}
  });
  if(n){logA('Sincronizó precio de '+n+' curso(s) con las tarifas');save();}
  return n;
}
/* ---- Calcula la meta que le toca a cada inscripción de un alumno ---- */
function metasDeAlumno(aid){
  const t=tarifas();
  const ins=db.insc.filter(i=>i.alumnoId===aid&&i.estado==='Activa');
  if(!ins.length)return null;
  const mats=ins.map(i=>{const c=curso(i.cursoId);return c?c.materia:null;}).filter(Boolean);
  const setA=[...new Set(mats)].sort().join('|');
  const combo=t.combos.find(cb=>cb.m&&cb.m.length&&[...new Set(cb.m)].sort().join('|')===setA&&+cb.p>0);
  const out={};
  if(combo){
    /* reparte el precio del combo proporcional al precio individual */
    const tot=ins.reduce((s,i)=>{const c=curso(i.cursoId);return s+(c?(+t.mat[c.materia]||0):0);},0);
    let acc=0;
    ins.forEach((i,k)=>{
      const c=curso(i.cursoId);const base=c?(+t.mat[c.materia]||0):0;
      const v=(k===ins.length-1)?(+combo.p-acc):Math.round(+combo.p*(tot?base/tot:1/ins.length));
      acc+=v;out[i.id]=v;
    });
    return {tipo:combo.n,total:+combo.p,metas:out,ins};
  }
  ins.forEach(i=>{const c=curso(i.cursoId);out[i.id]=c?(+t.mat[c.materia]||0):0;});
  return {tipo:'Individual',total:Object.values(out).reduce((s,v)=>s+v,0),metas:out,ins};
}
/* ---- Aplicar a UN alumno (desde su ficha) ---- */
function tarAplicarAlumno(aid){
  const r=metasDeAlumno(aid);
  if(!r){toast('Este alumno no tiene inscripciones activas.','err');return;}
  const a=alumno(aid);
  const lineas=r.ins.map(i=>{const c=curso(i.cursoId);return '• '+(c?c.nombre:'?')+': '+money(i.meta)+' → '+money(r.metas[i.id]);}).join('\n');
  if(!confirm('Aplicar tarifa a '+nombreA(a)+'\n\nTipo detectado: '+r.tipo+' ('+money(r.total)+')\n\n'+lineas+'\n\n¿Continuar?'))return;
  r.ins.forEach(i=>{if(i.estado!=='Becada')i.meta=r.metas[i.id];});
  logA('Aplicó tarifa «'+r.tipo+'» a '+nombreA(a)+' ('+money(r.total)+')');
  save();render();ficha(aid);
  toast('Tarifa aplicada ✓ '+r.tipo+' · '+money(r.total));
}
/* ---- Aplicar a TODOS (retroactivo) ---- */
function tarAplicarTodos(){
  const t=tarifas();
  const faltan=MATS4.filter(m=>db.cursos.some(c=>c.materia===m)&&!(+t.mat[m]>0));
  if(faltan.length){toast('Primero defina el precio de: '+faltan.join(', '),'err');return;}
  const ids=[...new Set(db.insc.filter(i=>i.estado==='Activa').map(i=>i.alumnoId))];
  const cambios=[];
  ids.forEach(aid=>{
    const r=metasDeAlumno(aid);if(!r)return;
    r.ins.forEach(i=>{
      if(i.estado==='Becada')return;
      const nueva=r.metas[i.id]||0, actual=+i.meta||0;
      if(nueva!==actual)cambios.push({i,aid,a:alumno(aid),c:curso(i.cursoId),actual,nueva,tipo:r.tipo,pg:pagado(i.id)});
    });
  });
  if(!cambios.length){toast('Todas las metas ya coinciden con las tarifas ✓');return;}
  const alerta=cambios.filter(x=>x.pg>x.nueva);
  const html='<div class="fld full">'+
   '<div class="tsub" style="white-space:normal;margin-bottom:12px">Se detectaron <b>'+cambios.length+'</b> metas por corregir en <b>'+[...new Set(cambios.map(x=>x.aid))].length+'</b> alumnos. Los alumnos con <b>2 materias</b> reciben el precio de combo; los de <b>1 sola</b>, el precio individual. Las <b>becas no se tocan</b>.</div>'+
   (alerta.length?'<div style="background:#FDE7E9;border:1px solid #F9A0A8;border-radius:10px;padding:11px;margin-bottom:12px;font-size:12.5px;color:#8A2A32"><b>⚠️ Atención:</b> '+alerta.length+' alumno(s) ya pagaron MÁS de la meta nueva. Revíselos: puede que tengan un precio especial. Se marcan en rojo abajo.</div>':'')+
   '<div style="max-height:300px;overflow-y:auto;border:1px solid var(--line);border-radius:10px">'+
   '<table style="width:100%;font-size:12.5px"><thead><tr><th>Alumno</th><th>Curso</th><th>Tipo</th><th class="num">Actual</th><th class="num">Nueva</th></tr></thead><tbody>'+
   cambios.map(x=>'<tr'+(x.pg>x.nueva?' style="background:#FDF4F5"':'')+'><td class="tname">'+esc(x.a?nombreA(x.a):'?')+'</td><td class="tsub">'+esc(x.c?x.c.nombre:'?')+'</td><td><span class="pill '+(x.tipo==='Individual'?'gray':'gold')+'">'+esc(x.tipo.replace('Combo ',''))+'</span></td><td class="num tsub">'+money(x.actual)+'</td><td class="num"><b style="color:var(--ok)">'+money(x.nueva)+'</b></td></tr>').join('')+
   '</tbody></table></div></div>';
  openModal('💲 Aplicar tarifas a todos los alumnos',html,()=>{
    cambios.forEach(x=>{x.i.meta=x.nueva;});
    tarSyncCursos();
    logA('Aplicó tarifas a TODOS: '+cambios.length+' metas actualizadas');
    save();closeModal();render();
    toast('✅ '+cambios.length+' metas actualizadas según las tarifas.');
  },'✅ Aplicar '+cambios.length+' cambios');
}

  return card('💲 Tarifas y combos','<button class="btn pri sm" onclick="MSADM.tarAplicarTodos()">🔄 Aplicar a todos los alumnos</button>',
   '<div class="bd">'+
   '<div class="tsub" style="white-space:normal;margin-bottom:14px">Defina el precio de cada materia por separado y el precio especial cuando se llevan en combo. El sistema detecta solo: si un alumno tiene <b>las 2 materias de un combo</b>, se le aplica el precio del combo; si lleva <b>una sola</b>, el individual. Sirve para los que ya están inscritos (retroactivo) y para los nuevos.</div>'+
   '<div style="font-weight:800;color:var(--navy);font-size:12px;letter-spacing:1px;margin-bottom:10px">PRECIOS INDIVIDUALES</div>'+
   matRows+
   '<div style="font-weight:800;color:#8A7226;font-size:12px;letter-spacing:1px;margin:18px 0 10px">PRECIOS DE COMBO</div>'+
   comboRows+
   '<button class="btn sm" onclick="MSADM.tarAddCombo()">+ Agregar combo</button>'+
   '<div class="tsub" style="margin-top:14px;white-space:normal">💡 Al presionar <b>«Aplicar a todos»</b> verá una vista previa de cada cambio antes de confirmarlo. Las <b>becas nunca se modifican</b>. Si alguien tiene un precio especial, corrija su meta después en su ficha (<b>✎ Meta</b>).</div>'+
   '</div>');
}
/* ---- Insertar la tarjeta en la vista Cursos ---- */
const _v9OrigVCursos=vCursos;
vCursos=function(){return _v9OrigVCursos()+cardTarifas();};

/* ---- Botón en la ficha del alumno ---- */
const _v9OrigFicha=ficha;
ficha=function(aid){
  _v9OrigFicha(aid);
  setTimeout(()=>{
    const mb=document.getElementById('msadmMBody');
    if(!mb||mb.querySelector('.tarBtn'))return;
    const r=metasDeAlumno(aid);
    if(!r)return;
    const cont=mb.querySelector('.fld.full');
    if(!cont)return;
    const d=document.createElement('div');
    d.className='tarBtn';
    d.style.cssText='background:#FBF7EA;border:1px solid #E5D5A3;border-radius:10px;padding:10px 12px;margin:8px 0 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap';
    d.innerHTML='<div style="font-size:12.5px;color:#8A7226"><b>Tarifa sugerida:</b> '+esc(r.tipo)+' · <b>'+money(r.total)+'</b></div>'+
      '<button type="button" class="btn sm pri" onclick="MSADM.tarAplicarAlumno('+aid+')">💲 Aplicar esta tarifa</button>';
    const primerCurso=mb.querySelector('div[style*="border:1px solid var(--line)"]');
    if(primerCurso)primerCurso.parentNode.insertBefore(d,primerCurso);
  },60);
};

/* ---- Exponer ---- */
Object.assign(window.MSADM,{
  tarSet,tarAddCombo,tarDelCombo,tarComboNom,tarComboMat,tarAplicarTodos,tarAplicarAlumno,
});
/* ====================================================================== END MÓDULO v9 */

load();
})();
</script>
