<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedStudents В· Panel de Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');
  .msadm{
    --navy:#042D5A; --navy-deep:#021D3D; --navy-soft:#0A3D73;
    --red:#EF4150; --gold:#C8A84B; --gold-soft:#E5D5A3;
    --bg:#F3F5F9; --card:#FFFFFF; --line:#E2E7F0;
    --ink:#1B2A41; --ink-soft:#5A6B84; --ok:#1E9E6A; --warn:#D98E04;
    --r:14px; --shadow:0 1px 3px rgba(4,45,90,.08),0 8px 24px rgba(4,45,90,.06);
  }
  .msadm,.msadm *{margin:0;padding:0;box-sizing:border-box}
  .msadm{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px}
  .msadm .app{display:flex;min-height:100vh}

  /* ---------- Sidebar ---------- */
  .msadm .side{width:232px;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20;flex-shrink:0}
  .msadm .brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
  .msadm .brand-logo{width:88px;max-width:80%;display:block;margin:0 auto 10px}
  .msadm .foot-perfil{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .msadm .foot-foto{width:42px;height:42px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--gold);flex-shrink:0}
  .msadm .lock-logo{width:96px;display:block;margin:0 auto 14px}
  .msadm .hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .msadm .hcard{border-radius:var(--r);padding:22px 26px;box-shadow:var(--shadow)}
  .msadm .hcard.ing{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);color:#fff}
  .msadm .hcard.pend{background:#fff;border:1px solid var(--line);border-left:6px solid var(--red)}
  .msadm .hcard .hlab{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;font-weight:800;opacity:.85}
  .msadm .hcard.pend .hlab{color:var(--ink-soft)}
  .msadm .hval{font-size:46px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums;margin-top:6px}
  .msadm .hcard.ing .hval{color:var(--gold)}
  .msadm .hcard.pend .hval{color:var(--red)}
  .msadm .hcard .hsub{font-size:12.5px;margin-top:4px;opacity:.75}
  .msadm .brand h1{font-size:17px;letter-spacing:2.5px;font-weight:800}
  .msadm .brand h1 span{color:var(--red)}
  .msadm .brand p{font-size:10.5px;letter-spacing:1.8px;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .msadm .nav{display:block;flex:1;padding:14px 10px;overflow-y:auto;margin:0;list-style:none;flex-wrap:nowrap}
  .msadm .nav button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 13px;margin-bottom:3px;background:none;border:none;border-radius:10px;color:rgba(255,255,255,.72);font-size:13.5px;font-weight:600;cursor:pointer;text-align:left;transition:.15s}
  .msadm .nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  .msadm .nav button.on{background:rgba(255,255,255,.10);color:#fff}
  .msadm .nav button{position:relative}
  .msadm .nav button.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;border-radius:99px;background:var(--gold)}
  .msadm .nav button .ic{width:20px;text-align:center;font-size:15px}
  .msadm .nav .sep{margin:12px 13px 8px;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.35)}
  .msadm .side-foot{padding:14px 20px;font-size:11px;color:rgba(255,255,255,.45);border-top:1px solid rgba(255,255,255,.1)}

  /* ---------- Main ---------- */
  .msadm .main{flex:1;padding:26px 30px 60px;max-width:1400px;min-width:0}
  .msadm .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .msadm .topbar h2{font-size:22px;font-weight:800;color:var(--navy)}
  .msadm .topbar .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .msadm .actions{display:flex;gap:9px;flex-wrap:wrap}

  .msadm .btn{display:inline-flex;align-items:center;gap:7px;line-height:1.3;text-align:center;vertical-align:middle;text-decoration:none;user-select:none;padding:9px 15px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
  .msadm .btn:hover{border-color:var(--navy);box-shadow:var(--shadow)}
  .msadm .btn.pri{background:var(--red);border-color:var(--red);color:#fff}
  .msadm .btn.pri:hover{background:#d9333f}
  .msadm .btn.navy{background:var(--navy);border-color:var(--navy);color:#fff}
  .msadm .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .msadm .btn.ghost{border:none;background:none;padding:5px 7px}
  .msadm .btn.danger{color:var(--red)}

  /* ---------- KPI cards ---------- */
  .msadm .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
  .msadm .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .msadm .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--navy)}
  .msadm .kpi.gold::before{background:var(--gold)}
  .msadm .kpi.red::before{background:var(--red)}
  .msadm .kpi.ok::before{background:var(--ok)}
  .msadm .kpi .lab{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .msadm .kpi .val{font-size:24px;font-weight:800;color:var(--navy);margin-top:6px;font-variant-numeric:tabular-nums}
  .msadm .kpi .val.money{color:var(--navy)}
  .msadm .kpi .val.neg{color:var(--red)}
  .msadm .kpi .hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px}

  /* ---------- Cards / tables ---------- */
  .msadm .card{display:block;position:static;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;min-width:0}
  .msadm .card .hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .msadm .card .hd h3{font-size:14.5px;font-weight:800;color:var(--navy)}
  .msadm .card .bd{padding:16px 18px}
  .msadm .tbl-wrap{overflow-x:auto}
  .msadm table{width:100%;border-collapse:collapse;font-size:13px}
  .msadm th{background:#F7F9FC;color:var(--ink-soft);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;font-weight:800;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
  .msadm td{padding:10px 12px;border-bottom:1px solid #EEF1F7;vertical-align:middle;white-space:nowrap}
  .msadm tr:last-child td{border-bottom:none}
  .msadm tbody tr:hover{background:#FAFBFE}
  .msadm td.num,.msadm th.num{text-align:right;font-variant-numeric:tabular-nums}
  .msadm .tname{font-weight:700;color:var(--navy)}
  .msadm .tsub{font-size:11.5px;color:var(--ink-soft)}

  .msadm .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;letter-spacing:.3px}
  .msadm .pill.ok{background:#E3F5EC;color:var(--ok)}
  .msadm .pill.warn{background:#FBF0DA;color:var(--warn)}
  .msadm .pill.bad{background:#FDE7E9;color:var(--red)}
  .msadm .pill.navy{background:#E4EBF5;color:var(--navy)}
  .msadm .pill.gold{background:#F5EED9;color:#8A7226}
  .msadm .pill.gray{background:#EDF0F5;color:var(--ink-soft)}

  .msadm .empty{padding:44px 20px;text-align:center;color:var(--ink-soft)}
  .msadm .empty .big{font-size:34px;margin-bottom:10px}
  .msadm .empty b{color:var(--navy)}
  .msadm .empty p{margin-top:6px;font-size:13px}

  /* ---------- Charts ---------- */
  .msadm .bars{display:flex;flex-direction:column;gap:10px}
  .msadm .bar-row{display:grid;grid-template-columns:150px 1fr 110px;gap:12px;align-items:center}
  .msadm .bar-row .bl{font-size:12.5px;font-weight:700;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msadm .bar-track{background:#EDF1F7;border-radius:99px;height:14px;overflow:hidden}
  .msadm .bar-fill{height:100%;background:linear-gradient(90deg,var(--navy-soft),var(--navy));border-radius:99px;min-width:2px}
  .msadm .bar-fill.gold{background:linear-gradient(90deg,#D9BE6E,var(--gold))}
  .msadm .bar-row .bv{font-size:12.5px;font-weight:800;color:var(--navy);text-align:right;font-variant-numeric:tabular-nums}
  .msadm .mchart{display:flex;gap:14px;align-items:flex-end;height:160px;padding-top:8px}
  .msadm .mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .msadm .mcol .pair{flex:1;display:flex;gap:4px;align-items:flex-end;width:100%;justify-content:center}
  .msadm .mcol .stick{width:22px;border-radius:6px 6px 2px 2px;min-height:2px}
  .msadm .mcol .stick.in{background:var(--navy)}
  .msadm .mcol .stick.out{background:var(--red)}
  .msadm .mcol .ml{font-size:11px;color:var(--ink-soft);font-weight:700}
  .msadm .legend{display:flex;gap:16px;font-size:11.5px;color:var(--ink-soft);margin-top:10px}
  .msadm .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px}

  /* ---------- Forms / modal ---------- */
  .msadm .overlay{position:fixed;inset:0;margin:0;width:auto;height:auto;background:rgba(2,29,61,.55);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
  .msadm .overlay.show{display:flex}
  .msadm .modal{display:block;position:relative;top:auto;left:auto;right:auto;bottom:auto;height:auto;width:100%;max-width:560px;overflow:visible;z-index:auto;margin:0;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(2,29,61,.35);animation:msadmPop .18s ease;outline:0}
  @keyframes msadmPop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .msadm .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .msadm .modal .mh h3{font-size:16px;font-weight:800;color:var(--navy)}
  .msadm .modal .mb{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .msadm .modal .mf{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}
  .msadm .fld{display:flex;flex-direction:column;gap:5px}
  .msadm .fld.full{grid-column:1/-1}
  .msadm .fld label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;font-weight:800;color:var(--ink-soft)}
  .msadm .fld input,.msadm .fld select,.msadm .fld textarea{padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;font-family:inherit;color:var(--ink);background:#fff;width:100%}
  .msadm .fld input:focus,.msadm .fld select:focus,.msadm .fld textarea:focus{outline:2px solid var(--navy);outline-offset:-1px}
  .msadm .fld .chk{display:flex;align-items:center;gap:8px;padding:9px 0;font-size:13px;font-weight:600;color:var(--ink)}
  .msadm .fld .chk input{width:17px;height:17px;accent-color:var(--red)}

  .msadm .search{padding:9px 13px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;min-width:230px;font-family:inherit}
  .msadm .search:focus{outline:2px solid var(--navy);outline-offset:-1px}
  .msadm select.filter{padding:8px 11px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;color:var(--navy);background:#fff;font-family:inherit}

  .msadm .toast{position:fixed;top:auto;left:auto;bottom:24px;right:24px;width:auto;pointer-events:auto;border:none;background:var(--navy);color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:700;box-shadow:0 10px 30px rgba(2,29,61,.4);z-index:99;display:none;max-width:340px}
  .msadm .toast.show{display:block;animation:msadmPop .2s ease}
  .msadm .toast.err{background:var(--red)}

  .msadm .wa{color:var(--ok);font-weight:800;text-decoration:none;font-size:12.5px}
  .msadm .wa:hover{text-decoration:underline}
  .msadm .avatar{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--gold);font-size:12px;font-weight:800;margin-right:10px;flex-shrink:0}
  .msadm .prog{background:#EDF1F7;border-radius:99px;height:7px;width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .msadm .prog i{display:block;height:100%;background:var(--ok);border-radius:99px}
  .msadm .prog i.p{background:var(--warn)}

  .msadm .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:1050px){.msadm .grid2{grid-template-columns:1fr}}
  @media(max-width:820px){
    .msadm .side{width:64px}
    .msadm .brand h1,.msadm .brand p,.msadm .nav button span.tx,.msadm .nav .sep,.msadm .side-foot{display:none}
    .msadm .brand-logo{width:40px;margin-bottom:0}
    .msadm .hero{grid-template-columns:1fr}
    .msadm .hval{font-size:32px}
    .msadm .nav button{justify-content:center}
    .msadm .main{padding:18px 14px 60px}
    .msadm .modal .mb{grid-template-columns:1fr}
    .msadm .bar-row{grid-template-columns:100px 1fr 90px}
  }
  .msadm .lock{position:fixed;inset:0;z-index:60;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
  .msadm .lock.oculto{display:none}
  .msadm .lock .caja{background:#fff;border-radius:18px;padding:38px 42px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.45);max-width:360px;width:100%}
  .msadm .lock h3{color:var(--navy);letter-spacing:2.5px;font-size:16px;font-weight:800}
  .msadm .lock h3 span{color:var(--red)}
  .msadm .lock p{color:var(--ink-soft);font-size:12.5px;margin:8px 0 20px}
  .msadm .lock input{width:190px;text-align:center;font-size:34px;letter-spacing:18px;padding:10px 0 10px 18px;border:2px solid var(--line);border-radius:12px;font-family:inherit;color:var(--navy)}
  .msadm .lock input:focus{outline:none;border-color:var(--navy)}
  .msadm .lock .err{color:var(--red);font-size:12.5px;font-weight:700;margin-top:12px;min-height:16px}
  .msadm .lock .caja.mal{animation:msadmShake .35s}
  @keyframes msadmShake{20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  @media print{.msadm .side,.msadm .actions,.msadm .btn,.msadm .wa,.msadm .topbar .actions{display:none!important}.msadm .main{padding:10px!important;max-width:none}.msadm .card{box-shadow:none;break-inside:avoid}}
  .msadm ::-webkit-scrollbar{width:10px;height:10px}
  .msadm ::-webkit-scrollbar-thumb{background:#C6CFDD;border-radius:99px}
  /* ============ PIEL CORPORATIVA MEDSTUDENTS ============ */
  .msadm{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif}
  .msadm .topbar h2,.msadm .hval,.msadm .kpi .val,.msadm .lock h3{font-family:'Playfair Display',Georgia,'Times New Roman',serif}
  /* --- menГә lateral: navy profundo con filo dorado --- */
  .msadm .side{background:linear-gradient(178deg,#07386E 0%,var(--navy) 34%,var(--navy-deep) 100%);box-shadow:inset -1px 0 0 rgba(200,168,75,.22)}
  .msadm .side::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#EBDCA9,var(--gold))}
  .msadm .brand{padding:30px 14px 24px;border-bottom:1px solid rgba(200,168,75,.30)}
  .msadm .brand-logo{width:132px;max-width:90%;filter:drop-shadow(0 8px 22px rgba(0,0,0,.5))}
  .msadm .brand-txt{display:none}
  .msadm .nav{display:block;padding:16px 12px}
  .msadm .nav button{font-size:13px;border-radius:12px;padding:11px 14px}
  .msadm .nav button.on{background:rgba(255,255,255,.10);box-shadow:inset 0 0 0 1px rgba(200,168,75,.22)}
  .msadm .nav .sep{color:rgba(200,168,75,.6);letter-spacing:2.4px;font-size:9.5px}
  .msadm .side-foot{border-top:1px solid rgba(200,168,75,.30);padding:18px 18px 20px;font-size:11px}
  .msadm .foot-perfil{gap:13px;margin-bottom:10px}
  .msadm .foot-foto{width:68px;height:68px;border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(200,168,75,.20),0 10px 22px rgba(0,0,0,.45)}
  .msadm .foot-perfil b{font-size:13.5px;letter-spacing:.3px}
  /* --- encabezados de secciГіn --- */
  .msadm .topbar h2{font-size:29px;letter-spacing:.3px}
  .msadm .topbar .sub{letter-spacing:.4px;margin-top:4px}
  /* --- tarjetas --- */
  .msadm .card{border-radius:16px;border-color:#E5EAF3;box-shadow:0 1px 2px rgba(4,45,90,.05),0 14px 36px rgba(4,45,90,.09)}
  .msadm .card .hd{padding:16px 20px;background:linear-gradient(180deg,#FBFCFE,#fff)}
  .msadm .card .hd h3{text-transform:uppercase;font-size:11.5px;letter-spacing:2px}
  /* --- hero: cifras protagonistas --- */
  .msadm .hero{gap:16px;margin-bottom:16px}
  .msadm .hcard{border-radius:18px;padding:28px 32px;position:relative;overflow:hidden}
  .msadm .hcard.ing{box-shadow:0 20px 46px rgba(4,45,90,.38)}
  .msadm .hcard.ing::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 86% 12%,rgba(200,168,75,.30),transparent 55%)}
  .msadm .hcard.ing::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .msadm .hcard.pend{border:1px solid #F4D7DA;border-left:1px solid #F4D7DA;box-shadow:0 14px 34px rgba(239,65,80,.12)}
  .msadm .hcard.pend::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),#F9A0A8,transparent)}
  .msadm .hval{font-size:54px;font-weight:700;letter-spacing:.5px;position:relative}
  .msadm .hcard .hlab{letter-spacing:2.6px;font-size:11px;position:relative}
  .msadm .hcard.ing .hlab{color:var(--gold-soft)}
  .msadm .hcard .hsub{position:relative;letter-spacing:.3px}
  .msadm .dls{font-family:'Inter','Segoe UI',system-ui,sans-serif;font-weight:800;font-size:.60em;vertical-align:9%;margin-right:3px;opacity:.92;letter-spacing:0}
  /* --- kpis --- */
  .msadm .kpi{border-radius:14px}
  .msadm .kpi .val{font-size:27px;letter-spacing:.3px}
  .msadm .kpi .lab{letter-spacing:1.6px;font-size:10.5px}
  /* --- botones --- */
  .msadm .btn{border-radius:11px}
  .msadm .btn.pri{background:linear-gradient(135deg,#F25865,var(--red));border:none;box-shadow:0 6px 16px rgba(239,65,80,.30)}
  .msadm .btn.pri:hover{background:linear-gradient(135deg,var(--red),#D9333F);box-shadow:0 8px 20px rgba(239,65,80,.42)}
  .msadm .btn.navy{background:linear-gradient(135deg,#0B4076,var(--navy));border:none;box-shadow:0 6px 16px rgba(4,45,90,.28)}
  /* --- tablas --- */
  .msadm th{letter-spacing:1.5px;background:linear-gradient(180deg,#F8FAFD,#F4F7FB)}
  .msadm tbody tr:hover{background:#F5F8FD}
  /* --- pantalla de PIN --- */
  .msadm .lock{background:radial-gradient(circle at 28% 18%,#0B4076 0%,var(--navy) 46%,var(--navy-deep) 100%)}
  .msadm .lock .caja{border-radius:22px;padding:46px 48px;box-shadow:0 34px 100px rgba(0,0,0,.55);border-top:4px solid var(--gold);max-width:390px}
  .msadm .lock-logo{width:150px;padding:18px;background:var(--navy);border-radius:50%;box-shadow:0 0 0 5px rgba(200,168,75,.25),0 16px 36px rgba(4,45,90,.35);margin-bottom:18px}
  .msadm .lock-txt{display:none}
  .msadm .lock p{letter-spacing:2px;text-transform:uppercase;font-size:10.5px;color:#8A7226;font-weight:700}
  @media(max-width:820px){
    .msadm .brand-logo{width:46px;padding:0}
    .msadm .hval{font-size:35px}
    .msadm .hcard{padding:22px 24px}
    .msadm .foot-foto{width:44px;height:44px}
    .msadm .topbar h2{font-size:23px}
  }

  /* ============ PORTADA DE ACCESO ============ */
  .msadm .lock{background:radial-gradient(circle at 24% 16%,#0C4278 0%,var(--navy) 44%,#021A36 100%)}

<script>
(function(){
/* ================= MedStudents Admin В· Dr. AbdГӯas MartГӯnez ================= */
const DB_KEY='medstudents_admin_v1';
let db={cursos:[],alumnos:[],insc:[],pagos:[],egresos:[],seq:1};
const store={
  async get(k){ if(window.storage&&window.storage.get){return await window.storage.get(k);} try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;} },
  async set(k,v){ if(window.storage&&window.storage.set){return await window.storage.set(k,v);} try{localStorage.setItem(k,v);return{value:v};}catch(e){return null;} }
};
let view='dash', q={alumnos:'',pagos:'',cursos:''}, f={cursoEstado:'',pagoCurso:'',inscCurso:''};

const $=s=>document.querySelector(s);
let __uidLast=0;
const uid=()=>{let t=Date.now()*1000+Math.floor(Math.random()*999);if(t<=__uidLast)t=__uidLast+1;__uidLast=t;if(db&&db.seq&&t<=db.seq)t=db.seq+1+Math.floor(Math.random()*999);db.seq=t;return t;};
const hoy=()=>new Date().toISOString().slice(0,10);
const money=n=>'$'+(Math.round(n||0)).toLocaleString('es-MX');
const moneyH=n=>'<span class="dls">$</span>'+(Math.round(n||0)).toLocaleString('es-MX');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fdate=d=>{if(!d)return 'вҖ”';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;};
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* ---------- Persistencia ---------- */
async function load(){
  try{const r=await store.get(DB_KEY); if(r&&r.value){db=JSON.parse(r.value);} }
  catch(e){ /* primera vez: no existe la clave */ }
  try{const s=await store.get('msadm_srv'); if(s&&s.value)srv=JSON.parse(s.value);}catch(e){}
  if(!srv.url)srv.url=SRV_URL_DEF;
  try{
    if(LOGO_B64||FOTO_B64){
      document.querySelectorAll('.msadm .brand-logo,.msadm .lk-logo').forEach(el=>{el.src=logoSrc();el.style.display='';});
      document.querySelectorAll('.msadm .foot-foto,.msadm .lk-foto').forEach(el=>{el.src=fotoSrc();el.style.display='';});
    }
  }catch(e){}
  expandirContenedores();
  if(!pinOK())pinMostrar();
  render();
  updateDot();
  if(srv.url)await pullCloud(true);
  if(db.autoSync!==false)syncForms(true);
}
const PIN_DEF=2085917638;
function pinHash(s){let h=5381;for(let k=0;k<s.length;k++){h=(((h*33)>>>0)^s.charCodeAt(k))>>>0;}return h;}
function pinOK(){try{return sessionStorage.getItem('msadm_ok')==='1';}catch(e){return window.__msadmOk===true;}}
function pinGuardar(){try{sessionStorage.setItem('msadm_ok','1');}catch(e){window.__msadmOk=true;}}
const FRASES=[
 'Donde hay amor por la medicina, hay amor por la humanidad. вҖ” HipГіcrates',
 'La disciplina de hoy es el diagnГіstico certero de maГұana.',
 'No estudias para un examen: estudias para tu primer paciente.',
 'Cada cГ©lula que estudias hoy salvarГЎ una vida maГұana.',
 'El cuerpo humano se aprende una vez y se honra toda la vida.',
 'La constancia vence lo que la prisa no alcanza.',
 'Un gran mГ©dico se forma en cada madrugada de estudio.',
 'El conocimiento pesa menos cuando se carga con pasiГіn.'
];
function expandirContenedores(){
  try{
    let el=document.querySelector('.msadm');
    let p=el&&el.parentElement, n=0;
    while(p&&p!==document.body&&n<12){
      const cs=getComputedStyle(p);
      if(cs.maxWidth&&cs.maxWidth!=='none'){p.style.setProperty('max-width','100%','important');}
      if(parseFloat(cs.paddingLeft)>24)p.style.paddingLeft='10px';
      if(parseFloat(cs.paddingRight)>24)p.style.paddingRight='10px';
      p=p.parentElement;n++;
    }
  }catch(e){}
}
function pantallaCompleta(){
  const el=document.querySelector('.msadm');
  try{
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){
      (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    }else{
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    }
  }catch(e){toast('Su navegador no permite pantalla completa aquГӯ.','err');}
}
function pinMostrar(){
  const l=document.getElementById('msadmLock');
  if(l){
    l.classList.remove('oculto');
    const f=document.getElementById('msadmLkFecha');
    if(f){let t=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});f.textContent=t.charAt(0).toUpperCase()+t.slice(1);}
    const fr=document.getElementById('msadmLkFrase');
    if(fr)fr.textContent='вҖң'+FRASES[Math.floor(Math.random()*FRASES.length)]+'вҖқ';
    cdTick();
    const i=document.getElementById('msadmPin');if(i)setTimeout(()=>i.focus(),80);
  }
}
function pinTry(v){
  if(!/^\d{0,4}$/.test(v)){const i=document.getElementById('msadmPin');if(i)i.value=v.replace(/\D/g,'').slice(0,4);return;}
  const _d=document.querySelectorAll('#msadmDots i');for(let k=0;k<_d.length;k++)_d[k].className=k<v.length?'on':'';
  if(v.length<4)return;
  const objetivo=(db.cfg&&db.cfg.pinHash)||PIN_DEF;
  const i=document.getElementById('msadmPin'),e=document.getElementById('msadmPinErr'),c=document.getElementById('msadmLockCaja');
  if(pinHash(v)===objetivo){
    pinGuardar();
    document.getElementById('msadmLock').classList.add('oculto');
    if(e)e.textContent='';if(i)i.value='';
    for(let k=0;k<_d.length;k++)_d[k].className='';
  }else{
    if(i)i.value='';if(e)e.textContent='PIN incorrecto';
    for(let k=0;k<_d.length;k++)_d[k].className='';
    if(c){c.classList.remove('mal');void c.offsetWidth;c.classList.add('mal');}
  }
}
function pinCambiar(){
  const act=prompt('PIN actual:');if(act===null)return;
  const objetivo=(db.cfg&&db.cfg.pinHash)||PIN_DEF;
  if(pinHash(act)!==objetivo){toast('PIN actual incorrecto.','err');return;}
  const nvo=prompt('Nuevo PIN (4 dГӯgitos):');if(nvo===null)return;
  if(!/^\d{4}$/.test(nvo)){toast('El PIN debe ser exactamente 4 dГӯgitos.','err');return;}
  db.cfg=db.cfg||{};db.cfg.pinHash=pinHash(nvo);
  logA('CambiГі el PIN de acceso');
  save();toast('PIN actualizado вң“ (aplica en todos sus paneles con la nube)');

/* ---------- FusiГіn de datos (nunca se pierde lo capturado en otro lado) ---------- */
function mergeArr(la,ca){
  const m=new Map();
  (ca||[]).forEach(x=>{if(x&&x.id!=null)m.set(x.id,x);});
  (la||[]).forEach(x=>{
    if(!x||x.id==null)return;
    const c=m.get(x.id);
    if(!c){m.set(x.id,x);return;}
    const r=Object.assign({},x,c);
    if(x.anulado&&!c.anulado)r.anulado=x.anulado;
    if(x.estado==='Baja'&&c.estado!=='Baja')r.estado='Baja';
    ['w','p','b'].forEach(fk=>{if(x[fk]||c[fk])r[fk]=true;});
    if(x.bit||c.bit){const seen={};r.bit=[].concat(c.bit||[],x.bit||[]).filter(bb=>{const k=(bb.f||'')+'|'+(bb.txt||'');if(seen[k])return false;seen[k]=1;return true;});}
    if(x.rep&&!c.rep)r.rep=x.rep;
    m.set(x.id,r);
  });
  return [...m.values()];
}
function mergeDb(l,c){
  if(!c)return l; if(!l)return c;
  const r={};
  ['cursos','alumnos','insc','pagos','egresos'].forEach(k=>r[k]=mergeArr(l[k],c[k]));
  const seenL={};
  r.log=[].concat(c.log||[],l.log||[]).filter(x=>{const k=(x.f||'')+'|'+(x.txt||'');if(seenL[k])return false;seenL[k]=1;return true;}).sort((a,b)=>a.f<b.f?1:-1).slice(0,200);
  r.gImp=[...new Set([].concat(l.gImp||[],c.gImp||[]))];
  r.formsMap=Object.assign({},l.formsMap||{},c.formsMap||{});
  r.cfg=Object.assign({},l.cfg||{},c.cfg||{});
  r.seq=Math.max(l.seq||1,c.seq||1);
  r.rev=Math.max(l.rev||0,c.rev||0);
  r.lastSync=l.lastSync; r.autoSync=l.autoSync;
  return r;
}

async function pullCloud(silent){

function repartoPago(p){

  if(!i||!compartida(i)||p.anulado||i.estado==='Becada')return null;
  const monto=+p.monto||0; if(monto<=0)return null;

}

/* ================= SINCRONIZAR GASTOS (Google Sheet) ================= */
async function syncGastos(){
  if(!srv.url||!srv.key){toast('Configure primero la nube (URL y clave) en Respaldo.','err');claveRapida();return;}
  toast('Leyendo su hoja de gastosвҖҰ');
  try{
    const r=await fetch(srv.url+(srv.url.indexOf('?')>=0?'&':'?')+'token='+encodeURIComponent(srv.key)+'&action=gastos');
    const j=await r.json();
    if(!j.ok){
      if(j.ping)toast('Su servidor tiene la versiГіn anterior del .gs (sin lector de gastos). Pegue el .gs actualizado y publique В«Nueva versiГіnВ».','err');
      else toast('El servidor respondiГі: '+(j.err||'error'),'err');
      return;
    }
    db.gImp=db.gImp||[];
    const limpiaMonto=s=>+String(s).replace(/[^0-9.\-]/g,'')||0;
    const fFecha=s=>{s=String(s||'').trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);if(m){let y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}return hoy();};
    const nuevos=(j.rows||[]).map(x=>({sig:'g'+x.n+'|'+(x.t||x.f)+'|'+x.m+'|'+String(x.c).slice(0,25),x})).filter(o=>db.gImp.indexOf(o.sig)<0&&limpiaMonto(o.x.m)>0);
    if(!nuevos.length){toast('Gastos al dГӯa вң“ No hay filas nuevas en la hoja.');return;}
    const tot=nuevos.reduce((s,o)=>s+limpiaMonto(o.x.m),0);
    if(!confirm('Se encontraron '+nuevos.length+' gastos nuevos en la hoja por un total de '+money(tot)+'.\n\nВҝImportarlos a Egresos?'))return;
    nuevos.forEach(o=>{
      const x=o.x;
      db.egresos.push({id:uid(),fecha:fFecha(x.f||x.t),categoria:(x.cat||'Otro').trim()||'Otro',beneficiario:(x.b||'вҖ”').trim(),concepto:(x.c||'').trim(),monto:limpiaMonto(x.m),metodo:(x.me||'').trim()||'Otro',nota:'VГӯa Google Sheets'+(x.r?' В· registrГі '+x.r.trim():'')});
      db.gImp.push(o.sig);
    });
    logA('ImportГі '+nuevos.length+' gastos ('+money(tot)+') desde la hoja de gastos');
    save();render();toast(nuevos.length+' gastos importados a Egresos вң“ Total: '+money(tot));
  }catch(e){toast('No pude conectar con su servidor de nube.','err');}
}

function finEditRep(iid){
  const i=insc(iid);if(!i)return;
  const a=alumno(i.alumnoId),c=curso(i.cursoId);
  openModal('рҹӨқ Reparto con el Dr. Ayax В· '+esc(a?nombreA(a):'?'),
    '<div class="fld full"><div class="tsub" style="white-space:normal">'+esc(c?c.nombre:'?')+' В· Meta <b>'+money(i.meta)+'</b>. Indique cuГЎnto de esa meta corresponde al Dr. Ayax y el % que Г©l nos entrega de su parte. Este reparto puede cambiar durante el semestre: aquГӯ lo ajusta cuando lo necesite.</div></div>'+
    F.num('bruto','Parte del Dr. Ayax de la meta ($)',i.rep?i.rep.bruto:'',1)+
    F.num('pct','% que Г©l nos entrega de su parte',i.rep?i.rep.pct:20,1)+
    '<div class="fld full"><div class="tsub" id="msadmRepPrev" style="white-space:normal"></div></div>',
  fd2=>{
    const bruto=+fd2.get('bruto')||0, pct=+fd2.get('pct')||0;
    if(bruto<=0){toast('La parte del Dr. Ayax debe ser mayor a cero.','err');return;}
    if(bruto>+i.meta){toast('La parte del Dr. Ayax no puede ser mayor que la meta ('+money(i.meta)+').','err');return;}
    i.rep={bruto,pct};
    if(String(i.profesor||'').indexOf('Ayax')<0)i.profesor='Dr. Abdi + Dr. Ayax Rizo';
    logA('Reparto Ayax de '+(a?nombreA(a):'?')+': '+money(bruto)+' de '+money(i.meta)+' al '+pct+'%');
    save();closeModal();render();toast('Reparto guardado вң“');
  },'Guardar reparto');
  setTimeout(()=>{
    const MB=$('#msadmMBody');
    const bI=MB.querySelector('input[name=bruto]'),pI=MB.querySelector('input[name=pct]'),prev=MB.querySelector('#msadmRepPrev');
    const upd=()=>{
      const b=+bI.value||0,pc=+pI.value||0,m=+i.meta||0;
      if(b>0&&m>0){const ayN=Math.round(b*(1-pc/100)),nos=Math.round(m-ayN);
        prev.innerHTML='Sobre la meta completa de '+money(m)+': al Dr. Ayax le quedan <b style="color:#8A7226">'+money(ayN)+'</b> netos y a nosotros <b style="color:var(--ok)">'+money(nos)+'</b> ('+money(m-b)+' + '+pc+'% de su parte). En pagos parciales se aplica proporcional.';
      }else prev.innerHTML='';
    };
    bI.addEventListener('input',upd);pI.addEventListener('input',upd);upd();
  },80);
}
function finRegistrarCorte(){
  const fdt=finDataMes();
  if(!fdt.def.length){toast('No hay pagos compartidos con reparto definido este mes.','err');return;}
  if(db.egresos.find(e=>!e.anulado&&e.mesCorteFin===finMes)){toast('El corte de este mes ya estГЎ registrado.','err');return;}
  const dir=fdt.transfer>0?'El Dr. Ayax nos transfiere '+money(fdt.transfer):(fdt.transfer<0?'Le transferimos '+money(-fdt.transfer):'Sin transferencia (cuentas parejas)');
  if(!confirm('Corte de '+finMesLbl(finMes)+':\n\nвҖў Parte del Dr. Ayax (neto): '+money(fdt.ayaxTot)+'\nвҖў Nuestra parte: '+money(fdt.nosTot)+'\nвҖў '+dir+'\n\nSe registrarГЎ un egreso por la parte del Dr. Ayax para que el balance quede real. ВҝContinuar?'))return;

}

function download(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function expJSON(){download('medstudents-respaldo-'+hoy()+'.json',JSON.stringify(db,null,2),'application/json');toast('Respaldo descargado вң“');}
function csvRow(arr){return arr.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',');}
function expCSV(kind){
  let rows=[];
  if(kind==='alumnos'){rows=[csvRow(['ID','Nombre','Apellido','Email','WhatsApp','Tipo','Grupo WA','Plataforma','Bienvenida'])].concat(db.alumnos.map(a=>csvRow([a.id,a.nombre,a.apellido,a.email,a.whatsapp,a.estatus||'',a.w?'SГҚ':'NO',a.p?'SГҚ':'NO',a.b?'SГҚ':'NO'])));}
  if(kind==='pagos'){rows=[csvRow(['Fecha','Alumno','Curso','Monto','MГ©todo','Referencia','RecibiГі','Nota'])].concat(db.pagos.map(p=>{const i=insc(p.inscId),a=i?alumno(i.alumnoId):null,c=i?curso(i.cursoId):null;return csvRow([p.fecha,a?nombreA(a):'',c?c.nombre:'',p.monto,p.metodo,p.ref,p.recibio,p.nota]);}));}
  if(kind==='egresos'){rows=[csvRow(['Fecha','CategorГӯa','Beneficiario','Concepto','Monto','MГ©todo','Nota'])].concat(db.egresos.map(e=>csvRow([e.fecha,e.categoria,e.beneficiario,e.concepto,e.monto,e.metodo,e.nota])));}
  download('medstudents-'+kind+'-'+hoy()+'.csv','\ufeff'+rows.join('\n'),'text/csv');toast('CSV descargado вң“');
}
function impJSON(inp){
  const file=inp.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.alumnos||!d.cursos)throw 0;db=d;save();render();toast('Respaldo restaurado вң“');}catch(e){toast('Archivo no vГЎlido.','err');}};
  r.readAsText(file);
}
function wipe(){if(!confirm('ВҝBorrar TODOS los datos? Esta acciГіn no se puede deshacer. Descargue un respaldo antes.'))return;db={cursos:[],alumnos:[],insc:[],pagos:[],egresos:[],seq:1};save();render();toast('Datos borrados.');}

function loadXLSX(cb){
  if(window.XLSX)return cb();
  toast('Cargando mГіdulo de ExcelвҖҰ');
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;
  s.onerror=()=>toast('No se pudo cargar el mГіdulo de Excel. Revise su conexiГіn a internet.','err');
  document.head.appendChild(s);
}
function expXLSX(){
  loadXLSX(function(){
    try{
      const wb=XLSX.utils.book_new();
      ['ANATOMГҚA','HISTOLOGГҚA','BIOQUГҚMICA','EMBRIOLOGГҚA'].forEach(function(m){
        const rows=db.insc.filter(i=>{const c=curso(i.cursoId);return c&&c.materia===m;}).map(i=>({i,a:alumno(i.alumnoId),c:curso(i.cursoId)})).filter(r=>r.a).sort((x,y)=>nombreA(x.a).localeCompare(nombreA(y.a)));
        if(!rows.length)return;
        const aoa=[['#','Alumno','Tipo','Curso','Email','WhatsApp','W','P','B','Pagado','Meta','Debe','Estado','PrГіx. pago','Compartido Dr. Ayax']];
        rows.forEach((r,k)=>{const ep=estPago(r.i);aoa.push([k+1,nombreA(r.a),r.a.estatus||'',r.c.nombre,r.a.email||'',r.a.whatsapp||'',r.a.w?'SГҚ':'NO',r.a.p?'SГҚ':'NO',r.a.b?'SГҚ':'NO',pagado(r.i.id),+r.i.meta||0,resto(r.i),r.i.estado==='Baja'?'BAJA':ep[0],dueDate(r.i)||'',(compartida(r.i)?(r.i.rep?money(r.i.rep.bruto)+' al '+r.i.rep.pct+'%':'SIN REPARTO'):'')]);});
        const ws=XLSX.utils.aoa_to_sheet(aoa);
        ws['!cols']=[{wch:4},{wch:30},{wch:9},{wch:32},{wch:28},{wch:14},{wch:4},{wch:4},{wch:4},{wch:10},{wch:10},{wch:10},{wch:11},{wch:11},{wch:20}];
        XLSX.utils.book_append_sheet(wb,ws,m.charAt(0)+m.slice(1).toLowerCase());
      });

      const wsP=XLSX.utils.aoa_to_sheet(ap);wsP['!cols']=[{wch:11},{wch:30},{wch:32},{wch:10},{wch:13},{wch:14},{wch:18},{wch:8}];

      const wsF=XLSX.utils.aoa_to_sheet(af);wsF['!cols']=[{wch:11},{wch:30},{wch:32},{wch:10},{wch:11},{wch:18},{wch:14},{wch:26}];

function genListaPDF(mats,act,pag){
  const hoyL=new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
  let cuerpo='',total=0;
  mats.forEach(function(m){
    const rows=db.insc.filter(i=>{const c=curso(i.cursoId);return c&&c.materia===m&&(!act||i.estado!=='Baja');})
      .map(i=>({i:i,a:alumno(i.alumnoId),c:curso(i.cursoId)})).filter(r=>r.a)
      .sort((x,y)=>nombreA(x.a).localeCompare(nombreA(y.a)));
    if(!rows.length)return;
    total+=rows.length;
    const sumP=rows.reduce((s,r)=>s+pagado(r.i.id),0), sumM=rows.reduce((s,r)=>s+(+r.i.meta||0),0);
    cuerpo+='<section'+(cuerpo?' class="salto"':'')+'>'+
    '<div class="band"><img src="'+logoSrc()+'" alt="" onerror="this.style.display=\'none\'"><div><div class="k">Lista oficial de alumnos</div><h2>'+esc(m)+'</h2><div class="s">'+hoyL+' В· '+rows.length+' alumno'+(rows.length===1?'':'s')+(act?' activos':'')+'</div></div></div>'+
    '<table><thead><tr><th>#</th><th>Alumno</th><th>Tipo</th><th>Curso</th><th>Contacto</th><th>W</th><th>P</th><th>B</th>'+(pag?'<th class="n">Pagado</th><th class="n">Meta</th><th>Estado</th>':'')+'</tr></thead><tbody>'+
    rows.map(function(r,k){
      const ep=estPago(r.i);
      return '<tr'+(r.i.estado==='Baja'?' class="baja"':'')+'><td>'+(k+1)+'</td><td class="nm">'+esc(nombreA(r.a))+(r.i.estado==='Baja'?' (BAJA)':'')+'</td>'+
      '<td>'+esc(r.a.estatus||'вҖ”')+'</td><td>'+esc(r.c.nombre)+'</td><td>'+esc(r.a.whatsapp||r.a.email||'вҖ”')+'</td>'+
      '<td class="c">'+(r.a.w?'вң“':'вҖ”')+'</td><td class="c">'+(r.a.p?'вң“':'вҖ”')+'</td><td class="c">'+(r.a.b?'вң“':'вҖ”')+'</td>'+
      (pag?'<td class="n">'+money(pagado(r.i.id))+'</td><td class="n">'+money(r.i.meta)+'</td><td class="'+(ep[0]==='PAGADO'?'ok':(ep[0]==='SIN PAGOS'?'mal':''))+'">'+ep[0]+'</td>':'')+'</tr>';
    }).join('')+
    '</tbody></table>'+
    (pag?'<div class="tot">Total: '+rows.length+' alumnos В· Pagado '+money(sumP)+' de '+money(sumM)+(sumM?' ('+Math.round(sumP/sumM*100)+'%)':'')+'</div>':'')+
    '</section>';
  });
  if(!cuerpo){toast('No hay alumnos inscritos en esa materia.','err');return;}
  const doc='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Listas de alumnos В· MedStudents</title><style>'+
  'body{font-family:"Segoe UI",Arial,sans-serif;color:#1B2A41;margin:0;background:#fff}'+
  'section{padding:34px 44px 18px}'+

  '.band img{width:86px;height:86px}'+
  '.band .k{font-size:10px;letter-spacing:2.5px;color:#E5D5A3;text-transform:uppercase;font-weight:800}'+

function fMeta(iid,aid){const i=insc(iid);if(!i)return;const v=prompt('Nueva meta a pagar (MXN):',i.meta);if(v===null)return;i.meta=+v||0;logA('CambiГі meta de inscripciГіn #'+iid+' a '+money(i.meta));save();render();ficha(aid);}
function fPlan(iid,aid){const i=insc(iid);if(!i)return;const v=prompt('ВҝEn cuГЎntos pagos liquidarГЎ el curso? (sugerido: 3)',i.numPagos||3);if(v===null)return;const n=Math.max(1,Math.min(12,parseInt(v)||1));i.numPagos=n;logA('Plan de pagos de inscripciГіn #'+iid+': '+n+' pagos');save();render();ficha(aid);}
function fProf(iid,aid){const i=insc(iid);if(!i)return;i.profesor=(i.profesor&&i.profesor.indexOf('Ayax')>=0)?'Dr. Abdi':'Dr. Abdi + Dr. Ayax Rizo';logA('Profesor de inscripciГіn #'+iid+': '+i.profesor);save();render();ficha(aid);}
function fNota(iid,aid){const i=insc(iid);if(!i)return;const v=prompt('Nota de seguimiento (compromiso de pago, acuerdoвҖҰ):','');if(!v||!v.trim())return;(i.bit=i.bit||[]).unshift({f:hoy(),txt:v.trim()});logA('Nota en inscripciГіn #'+iid+': '+v.trim());save();render();ficha(aid);}
function fBaja(iid,aid){bajaInsc(iid,aid);}
function bajaInsc(iid,aid){
  const i=insc(iid);if(!i)return;
  const a=alumno(i.alumnoId),c=curso(i.cursoId);
  if(i.estado==='Baja'){
    if(!confirm('ВҝReactivar a '+(a?nombreA(a):'?')+' en '+(c?c.nombre:'?')+'?'))return;
    i.estado='Activa';
    logA('REACTIVГ“ a '+(a?nombreA(a):'?')+' en '+(c?c.nombre:'?'));
    save();render();toast('Alumno reactivado вң“');
  }else{
    const r=resto(i);
    const m=prompt('Dar de BAJA a '+(a?nombreA(a):'?')+' en '+(c?c.nombre:'?')+(r>0?' (debe '+money(r)+')':'')+'. Motivo de la baja:','');
    if(m===null)return;
    i.estado='Baja';
    if(m.trim())(i.bit=i.bit||[]).unshift({f:hoy(),txt:'BAJA: '+m.trim()});
    logA('BAJA de '+(a?nombreA(a):'?')+' en '+(c?c.nombre:'?')+(m.trim()?' В· Motivo: '+m.trim():'')+(r>0?' В· Adeudaba '+money(r):''));
    save();render();toast('Alumno dado de baja del curso. Su historial de pagos se conserva.');
  }
  if(aid)ficha(aid);
}
function bajaAlumno(aid){
  const act=db.insc.filter(i=>i.alumnoId===aid&&i.estado!=='Baja');
  if(!act.length){toast('Este alumno no tiene inscripciones activas.','err');return;}
  if(act.length===1){bajaInsc(act[0].id);return;}
  toast('El alumno estГЎ en '+act.length+' cursos. Elija de cuГЎl darlo de baja en su ficha.');
  ficha(aid);
}
function notaCobranza(iid){const i=insc(iid);if(!i)return;const v=prompt('Nota de cobranza (ej. "prometiГі pagar el martes"):','');if(!v||!v.trim())return;(i.bit=i.bit||[]).unshift({f:hoy(),txt:v.trim()});logA('Cobranza В· inscripciГіn #'+iid+': '+v.trim());save();render();toast('Nota guardada вң“');}

/* ---------- InscripciГіn ---------- */
function mInsc(cursoId,alumnoId){
  if(!db.alumnos.length){toast('Primero registre al alumno.','err');mAlumno();return;}
  if(!db.cursos.length){toast('Primero cree el curso.','err');mCurso();return;}
  const cursosOp=db.cursos.filter(c=>c.estatus!=='Cerrado');
  openModal('Inscribir alumno a curso',
    F.sel('alumnoId','Alumno',db.alumnos.slice().sort((a,b)=>nombreA(a).localeCompare(nombreA(b))).map(a=>'<option value="'+a.id+'"'+(a.id===alumnoId?' selected':'')+'>'+esc(nombreA(a))+'</option>').join(''),null,1)+
    F.sel('cursoId','Curso',(cursosOp.length?cursosOp:db.cursos).map(c=>'<option value="'+c.id+'"'+(c.id===cursoId?' selected':'')+' data-mat="'+esc(c.materia)+'">'+esc(c.nombre)+' вҖ” '+money(c.precio)+'</option>').join(''),null,1)+
    F.num('meta','Meta a pagar (MXN)','',1)+
    F.sel('numPagos','ВҝEn cuГЎntos pagos liquidarГЎ? (sugerido 3)',opt(['1','2','3','4','5','6'],'3'))+
    F.num('pagoInicial','Pago inicial (MXN, opcional)')+
    F.date('fecha','Fecha de pago',hoy(),1)+
    F.date('proxPago','Fecha para el siguiente pago',addMonth(hoy()),1)+
    F.sel('recibio','ВҝQuiГ©n recibiГі el pago inicial?',opt(['Dr. Abdi','Dr. Ayax'],'Dr. Abdi'))+
    F.sel('profesor','Profesor del curso',opt(['Dr. Abdi','Dr. Abdi + Dr. Ayax Rizo'],'Dr. Abdi'),null,1)+
    F.sel('estado','Estado',opt(['Activa','Becada'],'Activa'))+
    repBoxHTML()+
    F.area('nota','Notas (descuento, acuerdo de pagosвҖҰ)'),
  fd=>{
    const aId=+fd.get('alumnoId'),cId=+fd.get('cursoId');
    const ya=db.insc.find(i=>i.alumnoId===aId&&i.cursoId===cId&&i.estado!=='Baja');
    if(ya){toast('Ese alumno ya estГЎ inscrito en ese curso.','err');return;}
    const iid=uid();
    const cObj=curso(cId), esComp=cObj&&(cObj.materia==='EMBRIOLOGГҚA'||cObj.materia==='BIOQUГҚMICA');
    const repB=+fd.get('repBruto')||0, repP=+fd.get('repPct')||0;
    const nuevo={id:iid,alumnoId:aId,cursoId:cId,meta:+fd.get('meta')||0,numPagos:+fd.get('numPagos')||3,fecha:fd.get('fecha'),proxPago:fd.get('proxPago')||addMonth(fd.get('fecha')),profesor:fd.get('profesor'),estado:fd.get('estado'),nota:fd.get('nota')};
    if(esComp&&repB>0)nuevo.rep={bruto:repB,pct:repP};
    if(esComp&&fd.get('profesor').indexOf('Ayax')<0&&repB>0)nuevo.profesor='Dr. Abdi + Dr. Ayax Rizo';
    db.insc.push(nuevo);
    {const _a=alumno(aId),_c=curso(cId);logA('InscribiГі a '+(_a?nombreA(_a):'?')+' en '+(_c?_c.nombre:'?')+(nuevo.rep?' В· reparto Ayax '+money(repB)+' al '+repP+'%':''));}
    const pi=+fd.get('pagoInicial')||0;
    if(pi>0)db.pagos.push({id:uid(),inscId:iid,fecha:fd.get('fecha'),monto:pi,metodo:'Transferencia',recibio:fd.get('recibio')||'Dr. Abdi',ref:'',nota:'Pago al inscribir'});
    save();closeModal();render();toast('InscripciГіn registrada вң“'+(pi>0?' Pago inicial de '+money(pi)+' ('+(fd.get('recibio')||'Dr. Abdi')+').':''));
  },'Inscribir');
  /* prellenar meta con precio del curso + mostrar reparto Ayax en Embrio/BioquГӯmica */
  setTimeout(()=>{
    const MB=$('#msadmMBody');
    const selC=MB.querySelector('select[name=cursoId]'),metaI=MB.querySelector('input[name=meta]');
    const fI=MB.querySelector('input[name=fecha]'),pxI=MB.querySelector('input[name=proxPago]');
    const repBox=MB.querySelector('.repbox');
    const toggleRep=()=>{const o=selC.options[selC.selectedIndex];const mat=o?o.getAttribute('data-mat'):'';if(repBox)repBox.style.display=(mat==='EMBRIOLOGГҚA'||mat==='BIOQUГҚMICA')?'block':'none';};
    selC.addEventListener('change',()=>{const c=curso(+selC.value);metaI.value=c?c.precio||'':'';toggleRep();});
    if(!metaI.value){const c0=curso(+selC.value);if(c0)metaI.value=c0.precio||'';}
    toggleRep();
    if(fI&&pxI)fI.addEventListener('change',()=>{const s=addMonth(fI.value);if(s)pxI.value=s;});
  },80);
}

    F.sel('recibio','ВҝQuiГ©n recibiГі el dinero?',opt(['Dr. Abdi','Dr. Ayax','Oficina'],p.recibio||'Dr. Abdi'))+

    '<div class="fld full"><div class="tsub" id="msadmPagoPlan" style="white-space:normal"></div></div>'+

/* ================= ACCESOS GRANULARES (reemplaza W/P/B simple) ================= */
/* 
  wa:   0=pendiente, 1=enviado, 2=confirmado  (grupo WhatsApp)
  plat: 0=pendiente, 1=acceso enviado, 2=confirmado  (plataforma)
  ebook: 0=pendiente, 1=entregado
  taller: 0=pendiente, 1=asignado, 2=asistiГі
  diag:   0=pendiente, 1=realizado
  factura: 0=no solicitada, 1=pendiente de enviar, 2=enviada
  Retrocompatibilidad: si a.w===true вҶ’ wa=2, a.p===true вҶ’ plat=2
*/
function accVal(a, campo, def=0){
  if(campo==='wa'){
    if(typeof a.wa === 'number') return a.wa;
    return a.w ? 2 : 0;
  }
  if(campo==='plat'){
    if(typeof a.plat === 'number') return a.plat;
    return a.p ? 2 : 0;
  }
  return typeof a[campo]==='number' ? a[campo] : def;
}
function accNext(a, campo){
  const maxV={wa:2,plat:2,ebook:1,taller:2,diag:1,factura:2};
  const cur=accVal(a,campo);
  a[campo]=cur>=maxV[campo]?0:cur+1;
  // keep legacy booleans in sync for backward compat
  if(campo==='wa'){a.w=a[campo]>=2;}
  if(campo==='plat'){a.p=a[campo]>=2;}
  if(campo==='wa'&&a[campo]>=2)a.b=true;
  logA('Acceso ['+campo+'] de '+nombreA(a)+' вҶ’ '+accLabel(campo,a[campo]));
  save();render();
}
function accLabel(campo,v){
  const labels={
    wa:['в¬ң WA: Pendiente','рҹҹЎ WA: Enviado','рҹҹў WA: Confirmado'],
    plat:['в¬ң Plat: Pendiente','рҹҹЎ Plat: Enviado','рҹҹў Plat: Confirmado'],
    ebook:['в¬ң Ebook: Pendiente','рҹҹў Ebook: Entregado'],
    taller:['в¬ң Taller: Pendiente','рҹҹЎ Taller: Asignado','рҹҹў Taller: AsistiГі'],
    diag:['в¬ң Diag: Pendiente','рҹҹў Diag: Realizado'],
    factura:['','рҹ”ҙ Factura: Pendiente','рҹҹў Factura: Enviada'],
  };
  return (labels[campo]||[])[v]||v;
}
function accPill(campo,v,aid){
  const cls={0:'gray',1:'warn',2:'ok'};
  const short={wa:['WA','WA','WAвң“'],plat:['Plat','Plat+','Platвң“'],ebook:['рҹ“–','рҹ“–вң“','рҹ“–вң“'],taller:['Taller','Tall+','Tallвң“'],diag:['Dx','Dxвң“','Dxвң“']};

  return '<button class="pill '+(cls[Math.min(v,2)]||'gray')+'" style="cursor:pointer;border:none;font-size:10px" title="'+accLabel(campo,v)+' вҖ” clic para cambiar" onclick="MSADM.accNext('+aid+',\''+campo+'\')">'+lbl+'</button>';
}

function parseCSVLine(l){const out=[];let cur='',inQ=false;for(let k=0;k<l.length;k++){const ch=l[k];if(inQ){if(ch==='"'){if(l[k+1]==='"'){cur+='"';k++;}else inQ=false;}else cur+=ch;}else{if(ch==='"')inQ=true;else if(ch===','){out.push(cur);cur='';}else cur+=ch;}}out.push(cur);return out;}
function analizarImport(){
  const box=document.getElementById('impBox');impRaw=box?box.value:impRaw;
  const selC=document.getElementById('impCurso');impCursoSel=selC&&selC.value?+selC.value:null;
  impErr='';impRows=null;
  const lines=impRaw.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length){impErr='No hay nada que analizar.';render();return;}
  const tab=lines[0].includes('\t');const rows=lines.map(l=>tab?l.split('\t'):parseCSVLine(l));
  const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const h=rows[0].map(norm);
  const find=(...ks)=>h.findIndex(c=>ks.some(k=>c.includes(k)));
  const iN=find('nombre'),iA=find('apellido'),iE=find('correo','email','mail'),iW=find('whats','telefono','celular'),iS=find('soy un alumno','alumno:','regular'),iC=find('selecciona el curso','curso al que');
  if(iN<0||iE<0){impErr='No encontrГ© los encabezados. Copie tambiГ©n la fila 1 de la hoja.';render();return;}
  const arr=rows.slice(1).map(r=>({n:r[iN],a:iA>=0?r[iA]:'',e:r[iE],w:iW>=0?r[iW]:'',s:iS>=0?r[iS]:'',c:iC>=0?r[iC]:'',t:''}));
  procesarSync(arr,false);impRaw='';render();
}

/* ---- Detectar quГ© cambiГі entre dos estados ---- */
function sbDiff(oldDb,newDb){
  const changed={};
  const ks=['alumnos','cursos','insc','pagos','egresos'];
  ks.forEach(k=>{
    const on=new Map((oldDb[k]||[]).map(x=>[x.id,JSON.stringify(x)]));
    const nn=new Map((newDb[k]||[]).map(x=>[x.id,JSON.stringify(x)]));
    const news=[],mods=[];
    nn.forEach((v,id)=>{if(!on.has(id))news.push(id);else if(on.get(id)!==v)mods.push(id);});
    if(news.length||mods.length)changed[k]={news,mods};
  });
  return changed;
}

/* ---- Inicializar Supabase ---- */
async function initSupabase(){
  const c=sbCfg();
  if(!c||sbInited||!window.supabase){return;}
  try{
    const{createClient}=window.supabase;
    const sb=createClient(c.url,c.key,{
      realtime:{params:{eventsPerSecond:10}},
      db:{schema:'public'},
      global:{headers:{'x-ms-clave':c.clave||''}}
    });
    sbClient=sb;
    /* Verificar que la clave de equipo sea correcta */
    try{
      const{error:tErr}=await sb.from('ms_state').select('id').eq('id','main').limit(1);
      if(tErr){
        sbClient=null;sbInited=false;cloudOK=false;updateDot();
        toast('рҹ”’ Clave de equipo incorrecta o faltante. RevГӯsela en Respaldo вҶ’ Supabase.','err');
        return;
      }
    }catch(e){}

    /* ---- Canal de datos (Realtime Postgres Changes) ---- */
    sb.channel('ms-state-ch')
      .on('postgres_changes',{
        event:'*',schema:'public',table:'ms_state',filter:'id=eq.main'
      }, payload=>{
        if(!payload.new||!payload.new.data)return;
        if(payload.new.updated_by===currentUser)return; // ignorar nuestros propios cambios
        const incoming=payload.new.data;
        const rev=payload.new.rev||0;
        if(rev<=(db.rev||0))return; // no retroceder
        const diff=sbDiff(db,incoming);
        db=mergeDb(db,incoming);
        db.rev=rev;
        try{store.set(DB_KEY,JSON.stringify(db));}catch(e){}
        render();
        /* NotificaciГіn especГӯfica de quГ© cambiГі */
        const quien=esc(payload.new.updated_by||'El equipo');
        let cambios=[];
        if(diff.pagos)cambios.push('рҹ’° '+(diff.pagos.news.length)+' pago'+(diff.pagos.news.length!==1?'s':''+' nuevo'));
        if(diff.alumnos)cambios.push('рҹҺ“ alumno'+(diff.alumnos.news.length?'s nuevos':'s actualizados'));
        if(diff.insc)cambios.push('рҹ“Ӣ inscripciones');
        if(diff.egresos)cambios.push('рҹ§ҫ egresos');
        toast('рҹ“Ў '+quien+' actualizГі: '+(cambios.join(' В· ')||'datos generales'));
      })
      .subscribe();

    /* ---- Canal de locks (pagos en ediciГіn) ---- */
    sb.channel('ms-locks-ch')
      .on('postgres_changes',{event:'*',schema:'public',table:'ms_locks'}, payload=>{
        if(payload.eventType==='DELETE'||payload.eventType==='INSERT'||payload.eventType==='UPDATE'){
          refreshLocks();
        }
      })
      .subscribe();

    /* ---- Canal de Presencia ---- */
    sbPresCh=sb.channel('ms-presence',{config:{presence:{key:currentUser}}});
    sbPresCh
      .on('presence',{event:'sync'},()=>{
        presState=sbPresCh.presenceState();
        updatePresUI();
      })
      .on('presence',{event:'join'},({newPresences})=>{
        const u=(newPresences||[])[0];
        if(u&&u.user&&u.user!==currentUser){
          toast('рҹ‘Ө '+esc(u.user)+' se conectГі al panel');
        }
        updatePresUI();
      })
      .on('presence',{event:'leave'},({leftPresences})=>{
        const u=(leftPresences||[])[0];
        if(u&&u.user&&u.user!==currentUser){
          toast('рҹ‘Ө '+esc(u.user)+' se desconectГі');
          // Liberar locks de quien se fue
          releaseLocks(u.user);
        }
        updatePresUI();
      })
      .subscribe(async status=>{
        if(status==='SUBSCRIBED'){
          await sbPresCh.track({
            user:currentUser,view:view,
            t:Date.now(),online:true
          });
        }
      });

    sbInited=true;
    cloudOK=true;dirty=false;
    updateDot();
    toast('вң… Supabase conectado В· В«'+esc(currentUser)+'В» en lГӯnea В· modo multiusuario activo');

  }catch(e){
    sbClient=null;sbInited=false;
    cloudOK=false;updateDot();
    toast('Supabase: error al conectar вҖ” '+String(e&&e.message||e),'err');
  }
}

      }).then(()=>{}).catch(()=>{});

}

/* ---- Pull de Supabase ---- */
async function sbPull(silent){
  if(!sbClient){toast('Configure Supabase primero en Respaldo.','err');return false;}
  try{
    const{data,error}=await sbClient.from('ms_state')
      .select('id,data,rev,updated_by,updated_at')
      .eq('id','main').single();
    if(error)throw error;
    if(data&&data.data&&(data.rev||0)>(db.rev||0)){
      db=mergeDb(db,data.data);
      db.rev=Math.max(db.rev||0,data.rev||0);
      try{await store.set(DB_KEY,JSON.stringify(db));}catch(e){}
      render();
      if(!silent)toast('Datos actualizados desde Supabase (rev '+db.rev+') вң“');
    }else{
      if(!silent)toast('Supabase al dГӯa вң“ Sin cambios nuevos. (rev '+db.rev+')');
    }
    cloudOK=true;updateDot();return true;
  }catch(e){
    cloudOK=false;updateDot();
    if(!silent)toast('Supabase: '+String(e&&e.message||e),'err');
    return false;
  }
}

/* ---- Locks de pagos (ediciГіn simultГЎnea) ---- */
async function sbAcquireLock(resourceId){
  if(!sbClient)return true; // sin Supabase = sin locks
  const expiresAt=new Date(Date.now()+120000).toISOString(); // 2 min
  try{
    const{data,error}=await sbClient.from('ms_locks').upsert({
      id:resourceId,usuario:currentUser,expires_at:expiresAt
    },{onConflict:'id',ignoreDuplicates:false}).select().single();
    if(error)throw error;
    // Verify we got it
    const{data:chk}=await sbClient.from('ms_locks').select('usuario').eq('id',resourceId).single();
    if(chk&&chk.usuario!==currentUser){
      toast('вҡ пёҸ '+esc(chk.usuario)+' ya estГЎ editando este pago. Espera a que termine.','err');
      return false;
    }
    return true;
  }catch(e){return true;} // Si falla el lock, permitir de todas formas
}
async function sbReleaseLock(resourceId){
  if(!sbClient)return;
  try{await sbClient.from('ms_locks').delete().eq('id',resourceId).eq('usuario',currentUser);}catch(e){}
}
async function releaseLocks(usuario){
  if(!sbClient||!usuario)return;
  try{await sbClient.from('ms_locks').delete().eq('usuario',usuario);}catch(e){}
}
async function refreshLocks(){
  if(!sbClient)return;
  try{
    const{data}=await sbClient.from('ms_locks').select('*').gt('expires_at',new Date().toISOString());
    sbLocks={};
    (data||[]).forEach(l=>{sbLocks[l.id]={user:l.usuario,exp:l.expires_at};});
    updatePresUI();
  }catch(e){}
}

function sbCopiarSQL(){
  const sql=`-- MedStudents Admin Panel В· Supabase Setup
-- Copiar y pegar en Supabase вҶ’ SQL Editor вҶ’ Run

CREATE TABLE IF NOT EXISTS ms_state (
  id TEXT PRIMARY KEY DEFAULT 'main',

);

  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER PUBLICATION supabase_realtime ADD TABLE ms_state;

ALTER TABLE ms_state DISABLE ROW LEVEL SECURITY;
ALTER TABLE ms_activity DISABLE ROW LEVEL SECURITY;
ALTER TABLE ms_locks DISABLE ROW LEVEL SECURITY;

INSERT INTO ms_state (id, data, rev) VALUES ('main', '{}', 0) ON CONFLICT (id) DO NOTHING;`;
  if(navigator.clipboard)navigator.clipboard.writeText(sql).then(()=>toast('SQL copiado al portapapeles вң“'));

}

/* ---- Override pullCloud() para Supabase ---- */
pullCloud=async function(silent){
  if(sbClient&&sbInited)return await sbPull(silent);
  if(!srv||!srv.url){if(!silent)toast('Configure Supabase o la nube de Apps Script primero.','err');return false;}
  // Fallback al pullCloud original (lo referenciaremos diferente)
  try{
    const r=await fetch(srv.url+(srv.url.indexOf('?')>=0?'&':'?')+'token='+encodeURIComponent(srv.key)+'&action=get');
    const j=await r.json();
    if(!j.ok){cloudOK=false;updateDot();if(!silent)toast('La nube respondiГі con error ('+(j.err||'?')+').','err');return false;}
    cloudOK=true;
    if(j.data&&(j.rev||0)>(db.rev||0)){db=mergeDb(db,j.data);db.rev=Math.max(db.rev||0,j.rev||0);try{await store.set(DB_KEY,JSON.stringify(db));}catch(e){}render();if(!silent)toast('Datos fusionados con la nube вң“');}
    else if(!silent)toast('Nube conectada вң“ Sin cambios nuevos.');
    updateDot();return true;
  }catch(e){cloudOK=false;updateDot();if(!silent)toast('No pude conectar con la nube.','err');return false;}
};

};

/* ================= 3) PROYECCIГ“N DE CIERRE DE SEMESTRE ================= */
function cardProyCierre(){
  const c=semCfg(),now=new Date();
  const ing=db.pagos.filter(p=>!p.anulado).reduce((s,p)=>s+(+p.monto||0),0);
  const porCobrar=db.insc.filter(i=>i.estado==='Activa').reduce((s,i)=>s+resto(i),0);
  const proyMin=ing+Math.round(porCobrar*0.7), proyMax=ing+porCobrar;
  /* ritmo temporal: usa avance del semestre (con ventana de preventa de 45 dГӯas) */
  const pre=45*864e5, t0=c.start.getTime()-pre, t1=c.end.getTime();
  const frac=Math.min(1,Math.max(0.02,(now.getTime()-t0)/(t1-t0)));
  const proyRitmo=now<c.start?null:Math.round(ing/frac);
  const meta=SEM_ANT.total, mx=Math.max(proyMax,meta,1);
  const central=proyRitmo?Math.round((Math.min(proyRitmo,proyMax)+proyMin)/2):Math.round((proyMin+proyMax)/2);
  const dif=central-meta;
  const verd=dif>=0
    ?'рҹҹў A este ritmo cierras el semestre <b>'+money(dif)+' ARRIBA</b> del anterior ('+money(meta)+').'
    :'рҹҹ  A este ritmo cerrarГӯas <b>'+money(-dif)+' abajo</b> del semestre anterior. Considera empujar intensivos/globales o apretar cobranza.';
  return card('рҹ”® ProyecciГіn de cierre de semestre','',
   '<div class="bd">'+
   '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px">'+
   '<div><div class="tsub">Cobrado hasta hoy</div><div style="font-size:22px;font-weight:800;color:var(--ok)">'+money(ing)+'</div></div>'+
   '<div><div class="tsub">Por cobrar (metas activas)</div><div style="font-size:22px;font-weight:800;color:var(--warn)">'+money(porCobrar)+'</div></div>'+
   '<div><div class="tsub">Cierre estimado</div><div style="font-size:22px;font-weight:800;color:var(--navy)">'+money(proyMin)+' вҖ“ '+money(proyMax)+'</div></div>'+
   (proyRitmo?'<div><div class="tsub">Ritmo actual proyecta</div><div style="font-size:22px;font-weight:800;color:#8A7226">'+money(proyRitmo)+'</div></div>':'')+
   '</div>'+
   '<div class="tsub" style="margin-bottom:4px">Rango de cierre vs semestre anterior ('+money(meta)+')</div>'+
   '<div class="bar-track" style="height:20px;position:relative">'+
     '<div class="bar-fill" style="width:'+Math.round(proyMin/mx*100)+'%;background:linear-gradient(90deg,var(--navy-soft),var(--navy))"></div>'+
     '<div style="position:absolute;top:-4px;bottom:-4px;left:'+Math.round(meta/mx*100)+'%;width:3px;background:var(--gold);border-radius:2px" title="Semestre anterior '+money(meta)+'"></div>'+
   '</div>'+
   '<div class="legend" style="margin-top:6px"><span><i style="background:var(--navy)"></i>ProyecciГіn mГӯnima (70% de cobro)</span><span><i style="background:var(--gold)"></i>Marca: semestre anterior</span></div>'+
   '<div style="margin-top:12px;font-size:13.5px;font-weight:700;color:var(--ink)">'+verd+'</div>'+
   '<div class="tsub" style="margin-top:6px;white-space:normal">El rango asume que cobras entre el 70% y el 100% de las metas activas. El "ritmo actual" extrapola lo cobrado segГәn el avance del semestre (incluye 45 dГӯas de preventa). Se afina solo conforme registres pagos.</div>'+
   '</div>');
}

    proc.map(r=>'<tr style="opacity:.7"><td class="tname">'+esc(r.nombre)+'<div class="tsub">'+esc(r.curso||'')+'</div></td><td class="num">'+money(r.monto)+'</td><td>'+(r.estado==='aprobado'?'<span class="pill ok">вң“ Aprobado</span>':'<span class="pill bad">вң• Rechazado</span>')+(r.motivo_rechazo?'<div class="tsub">'+esc(r.motivo_rechazo)+'</div>':'')+'</td><td class="tsub">'+esc(r.revisado_por||'вҖ”')+'</td><td>'+(r.comprobante?'<a class="wa" href="'+esc(r.comprobante)+'" target="_blank">рҹ–ј</a>':'')+'</td></tr>').join('')+'</tbody></table></div>'
    :'<div class="empty"><div class="big">вҖ”</div><b>Sin reportes procesados aГәn</b></div>';
  return topbar('Pagos por validar','Reportes de pago de tus alumnos В· '+pend.length+' pendientes В· '+money(totPend),
    '<button class="btn" onclick="MSADM.repCargar(false)">рҹ”„ Actualizar</button>')+
  cardPortal+
  card('вҸі Pendientes de validar В· '+pend.length+' В· '+money(totPend),'',bodyPend)+
  card('Historial de reportes','',bodyProc);
}

/* ---- Aprobar: convierte el reporte en pago real ---- */
async function repAprobar(id){
  const r=repPend.find(x=>x.id===id);if(!r)return;
  let a=r.alumno_id?alumno(r.alumno_id):null;
  let i=r.insc_id?insc(r.insc_id):null;
  /* Si no estГЎ identificado, ofrecer vincular o crear */
  if(!a||!i){
    const opts=db.insc.slice().sort((x,y)=>y.id-x.id).map(ii=>{const al=alumno(ii.alumnoId),c=curso(ii.cursoId),rr=resto(ii);return '<option value="'+ii.id+'">'+esc(nombreA(al))+' вҖ” '+esc(c?c.nombre:'?')+(rr>0?' (debe '+money(rr)+')':'')+'</option>';}).join('');
    openModal('вң“ Aprobar pago reportado',
      '<div class="fld full"><div style="background:#F7F9FC;border-radius:10px;padding:12px;margin-bottom:6px"><b style="color:var(--navy)">'+esc(r.nombre)+'</b> reportГі <b style="color:var(--ok)">'+money(r.monto)+'</b><div class="tsub">'+esc(r.curso||'')+' В· '+esc(r.referencia||'sin ref')+' В· '+esc(r.whatsapp||r.email||'')+'</div>'+(r.comprobante?'<a class="wa" href="'+esc(r.comprobante)+'" target="_blank" style="display:inline-block;margin-top:6px">рҹ–ј Ver comprobante</a>':'')+'</div>'+
      '<div class="tsub" style="margin:8px 0;white-space:normal">Este alumno no estГЎ vinculado automГЎticamente. Elige a quГ© inscripciГіn aplicar el pago:</div></div>'+
      F.sel('inscId','Aplicar a la inscripciГіn de:',opts,null,1)+
      F.sel('recibio','ВҝQuiГ©n recibiГі?',opt(['Dr. Abdi','Dr. Ayax','Oficina'],'Dr. Abdi')),
    fd=>{
      const ii=insc(+fd.get('inscId'));if(!ii){toast('Selecciona una inscripciГіn.','err');return;}
      _repConfirmar(r,ii,fd.get('recibio'));
      closeModal();
    },'Aprobar y registrar pago');
    return;
  }
  _repConfirmar(r,i,recibioAyax({recibio:r.nota})?'Dr. Ayax':'Dr. Abdi');
}
async function _repConfirmar(r,i,recibio){
  /* crear pago real en el panel */
  db.pagos.push({
    id:uid(),inscId:i.id,monto:+r.monto||0,
    fecha:r.fecha_pago||hoy(),metodo:r.metodo||'Transferencia',
    recibio:recibio||'Dr. Abdi',ref:r.referencia||'',
    nota:'Reportado por el alumno vГӯa portal'+(r.comprobante?' В· Comprobante: '+r.comprobante:'')+(r.nota?' В· '+r.nota:''),
    compReportado:r.comprobante||''
  });
  const a=alumno(i.alumnoId);
  logA('вң“ ValidГі pago reportado de '+(a?nombreA(a):r.nombre)+' ('+money(r.monto)+') vГӯa portal');
  save();
  /* marcar en Supabase */
  try{
    await sbClient.from('ms_pagos_reportados').update({estado:'aprobado',revisado_por:currentUser,updated_at:new Date().toISOString()}).eq('id',r.id);
  }catch(e){}
  r.estado='aprobado';r.revisado_por=currentUser;
  repBadge();render();
  const rr=resto(i);
  toast('вң… Pago de '+money(r.monto)+' registrado y validado вң“'+(rr>0?' Resta '+money(rr)+'.':' ВЎLiquidado! рҹҺү'));
}

  r.estado='rechazado';r.motivo_rechazo=m.trim();r.revisado_por=currentUser;
  logA('вң• RechazГі pago reportado de '+r.nombre+' ('+money(r.monto)+'): '+m.trim());
  repBadge();render();toast('Reporte rechazado.');
}

/* ======================================================================
   MГ“DULO v5b: DETECTOR ANTI-FRAUDE DE COMPROBANTES DUPLICADOS
   ====================================================================== */

/* ---- Normalizar referencia para comparar (quita espacios, guiones, ceros a la izquierda) ---- */
function normRef(s){
  return String(s||'').toLowerCase().replace(/[\s\-\/#.]/g,'').replace(/^0+/,'').trim();
}
/* ---- Buscar pagos que coincidan con una referencia/monto/fecha dados ---- */
function detectarDuplicado({ref,monto,fecha,excluirPagoId,excluirRepId}){
  const nRef=normRef(ref);
  const m=Math.round(+monto||0);
  const hits=[];
  /* 1) Contra pagos ya registrados en el panel */
  db.pagos.forEach(p=>{
    if(p.anulado)return;
    if(excluirPagoId&&p.id===excluirPagoId)return;
    const pRef=normRef(p.ref);
    let score=0, motivos=[];
    if(nRef&&pRef&&nRef===pRef){score+=3;motivos.push('misma referencia');}
    if(m>0&&Math.round(+p.monto||0)===m){score+=1;motivos.push('mismo monto');}
    if(fecha&&p.fecha&&fecha===p.fecha){score+=1;motivos.push('misma fecha');}
    /* referencia idГ©ntica = alerta fuerte; monto+fecha iguales sin ref = alerta media */
    if(score>=3||(score>=2&&nRef&&pRef&&nRef===pRef)||(!nRef&&m>0&&fecha&&score>=2)){
      const i=insc(p.inscId),a=i?alumno(i.alumnoId):null,c=i?curso(i.cursoId):null;
      hits.push({tipo:'pago',score,motivos,ref:p.ref,monto:p.monto,fecha:p.fecha,
        quien:a?nombreA(a):'(alumno)',curso:c?c.nombre:'',pagoId:p.id,recibio:p.recibio});
    }
  });
  /* 2) Contra reportes del portal aГәn pendientes/aprobados */
  (repPend||[]).forEach(r=>{
    if(excluirRepId&&r.id===excluirRepId)return;
    if(r.estado==='rechazado')return;
    const rRef=normRef(r.referencia);
    let score=0, motivos=[];
    if(nRef&&rRef&&nRef===rRef){score+=3;motivos.push('misma referencia');}
    if(m>0&&Math.round(+r.monto||0)===m){score+=1;motivos.push('mismo monto');}
    if(fecha&&r.fecha_pago&&fecha===r.fecha_pago){score+=1;motivos.push('misma fecha');}
    if(score>=3||(!nRef&&m>0&&fecha&&score>=2)){
      hits.push({tipo:'reporte',score,motivos,ref:r.referencia,monto:r.monto,fecha:r.fecha_pago,
        quien:r.nombre,curso:r.curso||'',estado:r.estado});
    }
  });
  return hits.sort((a,b)=>b.score-a.score);
}
/* ---- Modal de alerta de duplicado ---- */
function alertaDuplicado(hits,datos,onContinuar){
  const fuerte=hits.some(h=>h.motivos.includes('misma referencia'));
  const html=
    '<div class="fld full">'+
    '<div style="background:'+(fuerte?'#FDE7E9':'#FBF0DA')+';border:1.5px solid '+(fuerte?'#F9A0A8':'#E5D5A3')+';border-radius:12px;padding:14px;margin-bottom:14px">'+
    '<div style="font-size:15px;font-weight:800;color:'+(fuerte?'var(--red)':'#8A6D1B')+';margin-bottom:6px">'+(fuerte?'рҹҡЁ ВЎALERTA! Comprobante posiblemente duplicado':'вҡ пёҸ Posible pago repetido')+'</div>'+
    '<div class="tsub" style="white-space:normal;color:'+(fuerte?'#8A2A32':'#8A6D1B')+'">'+(fuerte
      ?'La referencia bancaria <b>'+esc(datos.ref||'(vacГӯa)')+'</b> ya fue usada. Un alumno podrГӯa estar reportando el MISMO comprobante dos veces. RevГӯsalo antes de continuar.'
      :'Existe otro pago con el mismo monto y fecha. Verifica que no sea el mismo comprobante contado dos veces.')+'</div></div>'+
    '<div class="tsub" style="font-weight:800;color:var(--navy);margin-bottom:8px">Coincidencias encontradas ('+hits.length+'):</div>'+
    '<div style="max-height:260px;overflow-y:auto">'+
    hits.map(h=>{
      const badge=h.motivos.includes('misma referencia')?'<span class="pill bad">MISMA REFERENCIA</span>':'<span class="pill warn">'+esc(h.motivos.join(' + '))+'</span>';
      return '<div style="border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">'+
        '<b style="color:var(--navy)">'+esc(h.quien)+'</b>'+badge+'</div>'+
        '<div class="tsub" style="margin-top:4px">'+(h.tipo==='reporte'?'рҹ“Ҙ Reporte del portal ('+esc(h.estado||'pendiente')+')':'рҹ’° Pago ya registrado')+
        ' В· '+money(h.monto)+' В· '+(h.fecha?fdate(h.fecha):'sin fecha')+' В· Ref: '+esc(h.ref||'вҖ”')+(h.curso?' В· '+esc(h.curso):'')+'</div></div>';
    }).join('')+
    '</div>'+
    '<div class="tsub" style="margin-top:12px;white-space:normal">Si confirmaste que <b>SГҚ es un pago diferente y legГӯtimo</b> (por ejemplo, dos abonos parciales el mismo dГӯa), puedes continuar. Si es el mismo comprobante repetido, cancela y no lo registres.</div>'+
    '</div>';
  openModal('рҹҡЁ RevisiГіn anti-duplicado',html,fd=>{
    closeModal();
    onContinuar&&onContinuar();
  },'вҡ пёҸ SГ© lo que hago, registrar de todas formas');
  /* colorear el botГіn de continuar en rojo */
  setTimeout(()=>{const b=$('#msadmMSave');if(b){b.style.background='linear-gradient(135deg,#D98E04,#B87503)';b.style.boxShadow='none';}},30);
}
/* ---- VerificaciГіn previa reusable: llama onOk() si estГЎ limpio, o muestra alerta ---- */
function chequearFraude(datos,onOk){
  const hits=detectarDuplicado(datos);
  if(hits.length)alertaDuplicado(hits,datos,onOk);
  else onOk();
}

/* ======================================================================
   ENGANCHE: interceptar mPago y repAprobar para chequear duplicados
   ====================================================================== */

/* ---- Envolver mPago: al guardar un pago nuevo, chequear duplicado ---- */
const _v5bOrigMPago=mPago;
mPago=function(inscId,pagoId){
  _v5bOrigMPago(inscId,pagoId);
  /* interceptar el submit del formulario para chequear antes de guardar */
  setTimeout(()=>{
    const form=$('#msadmMForm');
    if(!form||form.__fraudHooked)return;
    form.__fraudHooked=true;
    const origOnsubmit=onSubmit;
    if(!origOnsubmit)return;
    onSubmit=function(fd){
      const ref=fd.get('ref'), monto=+fd.get('monto')||0, fecha=fd.get('fecha');
      const hits=detectarDuplicado({ref,monto,fecha,excluirPagoId:pagoId});
      if(hits.length){
        /* guardar los datos y mostrar alerta; si el usuario confirma, ejecutar el submit original */
        alertaDuplicado(hits,{ref,monto,fecha},()=>{origOnsubmit(fd);});
      }else{
        origOnsubmit(fd);
      }
    };
  },120);
};

/* ---- Envolver _repConfirmar: chequear al aprobar un reporte del portal ---- */
if(typeof _repConfirmar==='function'){
  const _v5bOrigConfirmar=_repConfirmar;
  _repConfirmar=function(r,i,recibio){
    const hits=detectarDuplicado({ref:r.referencia,monto:r.monto,fecha:r.fecha_pago,excluirRepId:r.id});
    if(hits.length){
      alertaDuplicado(hits,{ref:r.referencia,monto:r.monto,fecha:r.fecha_pago},()=>{_v5bOrigConfirmar(r,i,recibio);});
    }else{
      _v5bOrigConfirmar(r,i,recibio);
    }
  };
}

/* ======================================================================
   AUDITORГҚA: vista de comprobantes con referencia repetida (panel de control)
   ====================================================================== */
function cardAuditoriaRefs(){
  /* agrupar pagos por referencia normalizada */
  const grupos={};
  db.pagos.filter(p=>!p.anulado&&p.ref&&normRef(p.ref)).forEach(p=>{
    const k=normRef(p.ref);(grupos[k]=grupos[k]||[]).push(p);
  });
  const dup=Object.entries(grupos).filter(([k,arr])=>arr.length>1);
  if(!dup.length)return card('рҹӣЎ AuditorГӯa de comprobantes','<span class="pill ok">Sin duplicados</span>',
    '<div class="bd"><div class="tsub" style="white-space:normal">вң… No se detectaron referencias bancarias repetidas entre los pagos registrados. El sistema revisa cada nuevo pago automГЎticamente.</div></div>');
  return card('рҹӣЎ AuditorГӯa de comprobantes','<span class="pill bad">'+dup.length+' referencia'+(dup.length>1?'s':'')+' repetida'+(dup.length>1?'s':'')+'</span>',
    '<div class="bd"><div class="tsub" style="white-space:normal;margin-bottom:12px;color:var(--red);font-weight:700">вҡ пёҸ Estas referencias bancarias aparecen en mГЎs de un pago. RevГӯsalas: pueden ser el mismo comprobante usado dos veces.</div>'+
    dup.map(([k,arr])=>{
      const tot=arr.reduce((s,p)=>s+(+p.monto||0),0);
      return '<div style="border:1.5px solid #F9A0A8;border-radius:10px;padding:12px;margin-bottom:10px;background:#FDF4F5">'+
        '<div style="font-weight:800;color:var(--red);margin-bottom:6px">Ref: '+esc(arr[0].ref)+' В· '+arr.length+' pagos В· '+money(tot)+'</div>'+
        arr.map(p=>{const i=insc(p.inscId),a=i?alumno(i.alumnoId):null,c=i?curso(i.cursoId):null;
          return '<div class="tsub" style="display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-top:1px solid #F9D0D5">'+
          '<span>'+esc(a?nombreA(a):'?')+' В· '+esc(c?c.nombre:'?')+'</span>'+
          '<span>'+money(p.monto)+' В· '+fdate(p.fecha)+' В· '+esc(p.recibio||'')+' <button class="btn sm ghost danger" onclick="MSADM.anularPago('+p.id+')">Anular</button></span></div>';
        }).join('')+
      '</div>';
    }).join('')+'</div>');
}
/* insertar auditorГӯa en la vista Validar y en Pagos */
const _v5bOrigVValidar=vValidar;
vValidar=function(){
  return _v5bOrigVValidar()+cardAuditoriaRefs();
};
const _v5bOrigVPagos=vPagos;
vPagos=function(){
  const base=_v5bOrigVPagos();
  /* solo mostrar auditorГӯa si hay duplicados, para no estorbar */
  const grupos={};
  db.pagos.filter(p=>!p.anulado&&p.ref&&normRef(p.ref)).forEach(p=>{const k=normRef(p.ref);(grupos[k]=grupos[k]||[]).push(p);});
  const hayDup=Object.values(grupos).some(a=>a.length>1);
  return base+(hayDup?cardAuditoriaRefs():'');
};
